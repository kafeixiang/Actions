# 工作流名称：每小时多仓库自动同步（变基/强制覆盖模式）
name: Multi-Repo Sync (Safety PR Mode)

on:
  schedule:
    - cron: '0 * * * *' # 定时触发：每小时运行一次
  workflow_dispatch:      # 手动触发

jobs:
  rebase-sync:
    runs-on: ubuntu-latest

    # ⭐ 核心优化 1：引入按仓库隔离的并发锁。
    # 确保当 GitHub 发生任务积压时，同一仓库同一时间只有一个同步实例在运行，彻底杜绝多实例同时 Force Push 引发的远端崩溃
    concurrency:
      group: sync-${{ matrix.fork }}
      cancel-in-progress: true

    strategy:
      fail-fast: false     # 即使其中一个仓库报错，也要继续处理后续仓库
      matrix:
        include:
          # --- 待同步仓库清单 ---
          # 格式解析：
          # name: 仅用于日志显示的标签
          # fork: 你的仓库路径（用户名/仓库名）
          # upstream: 原作者的原始仓库地址
          # mappings: 分支对应关系，格式为 "上游分支:本地分支"。
          #           注意：若本地分支名以 ! 结尾（如 Alpha!），则使用强制覆盖（Hard Reset）；否则默认使用变基（Rebase）。

          - name: "mihomo"
            fork: "kafeixiang/mihomo"
            upstream: "https://github.com/MetaCubeX/mihomo.git"
            mappings: "Meta:Meta Alpha:Alpha! Alpha:FlClash" # Meta 变基同步，Alpha 强制同步

          - name: "ClashMetaForAndroid"
            fork: "kafeixiang/ClashMetaForAndroid"
            upstream: "https://github.com/MetaCubeX/ClashMetaForAndroid.git"
            mappings: "main:main update-dependencies:update-dependencies! update-dependencies:dev"

          - name: "sing-box"
            fork: "kafeixiang/sing-box"
            upstream: "https://github.com/SagerNet/sing-box.git"
            mappings: "stable:stable"

          - name: "v2rayNG"
            fork: "kafeixiang/v2rayNG"
            upstream: "https://github.com/2dust/v2rayNG.git"
            mappings: "master:dev"

          - name: "v2rayN"
            fork: "kafeixiang/v2rayN"
            upstream: "https://github.com/2dust/v2rayN.git"
            mappings: "master:dev"

          - name: "v2rayNX"
            fork: "kafeixiang/v2rayNX"
            upstream: "https://github.com/2dust/v2rayN.git"
            mappings: "master:master"

          - name: "NekoBoxForAndroid"
            fork: "kafeixiang/NekoBoxForAndroid"
            upstream: "https://github.com/MatsuriDayo/NekoBoxForAndroid.git"
            mappings: "main:dev"

          - name: "FlClash"
            fork: "kafeixiang/FlClash"
            upstream: "https://github.com/chen08209/FlClash.git"
            mappings: "main:main dev:dev! dev:dev-cs dev:dev-core"

          - name: "Exclave"
            fork: "kafeixiang/Exclave"
            upstream: "https://github.com/dyhkwong/Exclave.git"
            mappings: "dev:dev-2"

          - name: "husi"
            fork: "kafeixiang/husi"
            upstream: "https://codeberg.org/xchacha20-poly1305/husi.git"
            mappings: "dev:dev! dev:dev-3 dev:dev-zt-16-s2 dev:TB3"

          - name: "husi2"
            fork: "kafeixiang/husi2"
            upstream: "https://codeberg.org/xchacha20-poly1305/husi.git"
            mappings: "dev:dev! dev:dev-2 dev:dev-zt-16 dev:TB3"

          - name: "Exclave2"
            fork: "kafeixiang/Exclave2"
            upstream: "https://github.com/dyhkwong/Exclave.git"
            mappings: "dev:dev-2"

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 第一步：拉取你的 Fork 仓库
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.fork }}
          token: ${{ secrets.PAT_TOKEN }} # 使用你设置的个人访问令牌
          fetch-depth: 0                   # 设为 0 以获取完整 Git 提交历史（Rebase 必选）

      # 第二步：执行核心同步逻辑
      - name: Sync and Notify
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }} # 将 Token 注入环境变量，供 GitHub CLI 创建 PR 使用
        run: |
          # 1. 设置 Git 身份信息
          git config --global user.name "kafeixiang"
          git config --global user.email "kafeixiang@example.com"
          
          # 2. 添加上游仓库
          git remote add upstream ${{ matrix.upstream }}
          
          # ⭐ 核心优化 2：精准定向 Fetch。从 mappings 中动态提取真正需要的上游分支，拒绝拉取上游其他数百个无关的分支垃圾数据
          UP_BRANCHES=""
          for pair in ${{ matrix.mappings }}; do
            UP_BRANCHES="$UP_BRANCHES ${pair%%:*}"
          done
          
          echo ">>>> 正在精确获取目标分支 ($UP_BRANCHES) 最新状态..."
          git fetch upstream $UP_BRANCHES --quiet
          git fetch origin --quiet || true
          
          # 3. 循环处理映射
          for pair in ${{ matrix.mappings }}; do
            UP_BR=${pair%%:*}       # 获取冒号前的部分：上游分支名
            RAW_LOCAL_BR=${pair#*:} # 获取冒号后的部分：原始本地分支名
          
            if [[ "$RAW_LOCAL_BR" == *! ]]; then
              METHOD="reset"; LOCAL_BR=${RAW_LOCAL_BR%!}
            else
              METHOD="rebase"; LOCAL_BR=$RAW_LOCAL_BR
            fi
          
            echo ">>>> [${{ matrix.name }}] 处理分支同步: $UP_BR -> $LOCAL_BR (模式: $METHOD)"
          
            # 4. 获取最新代码（注：fetch 动作已在进入循环前一次性高效完成）
            # 5. 确保切换到正确的本地分支
            if git rev-parse --verify origin/$LOCAL_BR >/dev/null 2>&1; then
              git checkout -B $LOCAL_BR origin/$LOCAL_BR
            else
              git checkout -b $LOCAL_BR upstream/$UP_BR
            fi

            if [ "$METHOD" == "reset" ]; then
              # 强制覆盖模式
              git reset --hard upstream/$UP_BR
              git push origin $LOCAL_BR --force
              echo ">>>> [成功] $LOCAL_BR 已重置为上游最新状态"
            else
              # --- 执行 Rebase（变基） ---
              if git rebase upstream/$UP_BR; then
                git push origin $LOCAL_BR --force
                echo ">>>> [成功] $LOCAL_BR 变基同步完成"
          
                # 同步成功后，自动关闭并删除该分支之前的冲突 PR
                gh pr list --repo "${{ matrix.fork }}" --base "$LOCAL_BR" --state open --json number,title | jq -c '.[]' | while read -r pr; do
                  if [[ $(echo "$pr" | jq -r '.title') == *"冲突提醒"* ]]; then
                    PR_NUM=$(echo "$pr" | jq -r '.number')
                    echo ">>>> [清理] 同步已恢复，关闭旧 PR #$PR_NUM"
                    gh pr close --repo "${{ matrix.fork }}" "$PR_NUM" --delete-branch || true
                  fi
                done
              else
                echo ">>>> [冲突] $LOCAL_BR 变基失败，正在判断冲突类型..."
                git rebase --abort

                # ⭐ 终极血统识别修复：通过作者身份过滤，精准计算真正属于你（kafeixiang）的自定义提交数量
                # 这能完美识别并解决上游“假冲突”（即上游强推历史、重写 Commit 导致的旧提交残留问题）
                USER_COMMIT_COUNT=$(git log origin/$LOCAL_BR ^upstream/$UP_BR --author="kafeixiang" --oneline | wc -l)

                if [ "$USER_COMMIT_COUNT" -eq 0 ]; then
                  # ==== 场景 A：你没改过任何代码，完全是上游重写历史导致的硬历史冲突 ====
                  echo ">>>> [智能识别] 检测到上游执行了历史重写（Force Push），且本地并无你本人的自定义修改！"
                  echo ">>>> 正在自动切换为强刷模式，全面对齐上游新历史..."
                  git reset --hard upstream/$UP_BR
                  git push origin $LOCAL_BR --force
                  echo ">>>> [成功] $LOCAL_BR 已无缝完成上游最新历史同步"
          
                  # 既然已经无损同步成功，顺手清理并关闭可能存在的旧冲突 PR
                  gh pr list --repo "${{ matrix.fork }}" --base "$LOCAL_BR" --state open --json number,title | jq -c '.[]' | while read -r pr; do
                    if [[ $(echo "$pr" | jq -r '.title') == *"冲突提醒"* ]]; then
                      PR_NUM=$(echo "$pr" | jq -r '.number')
                      gh pr close --repo "${{ matrix.fork }}" "$PR_NUM" --delete-branch || true
                    fi
                  done
                else
                  # ==== 场景 B：你确实自己改过代码，这时候才真正启动真正的 Breaking Change 修复机制 ====
                  echo ">>>> [智能识别] 检测到你本地确实包含 $USER_COMMIT_COUNT 个自定义提交。"
          
                  # ==== breaking change 自动修复 BEGIN ====
                  # ⭐ 关键修复：加 --author 确保提取出的【只有你自己写的代码】，并加上 --reverse 保证按时间【从旧到新】正序重放！
                  COMMITS=$(git rev-list --reverse origin/$LOCAL_BR ^upstream/$UP_BR --author="kafeixiang")
          
                  # 本地纯净盲试分支，去除多余的时间戳，不往远端推无意义的临时垃圾
                  AUTO_FIX_BRANCH="auto-fix-$LOCAL_BR-tmp"
                  git checkout -B $AUTO_FIX_BRANCH upstream/$UP_BR
                  AUTO_FIX_PASS="true"
          
                  for commit in $COMMITS; do
                    echo ">>>> [自动修复] 正在尝试重放主人自定义提交: $commit"
                    if ! git cherry-pick $commit; then
                      AUTO_FIX_PASS="false"
                      git cherry-pick --abort
                      break
                    fi
                  done

                  # ⭐ 修复：用 if-else 代替 continue，避免嵌套循环问题
                  if [ "$AUTO_FIX_PASS" == "true" ]; then
                    echo ">>>> [自动修复] breaking change 导致的 rebase 冲突已通过【独家修改正序重放】自动修复"
                    # 本地无缝合流，省去对临时分支的 push 和 delete 的网络请求，直接将本地主分支重置并一次性强推
                    git checkout $LOCAL_BR
                    git reset --hard $AUTO_FIX_BRANCH
                    git push origin $LOCAL_BR --force
                    echo ">>>> [成功] $LOCAL_BR 已自动同步为上游新代码 + 你的提交"
                    git branch -D $AUTO_FIX_BRANCH || true
                  else
                    # ========== 自动修复失败，走原有冲突提醒 PR 处理 ==========
                    git checkout $LOCAL_BR
                    git branch -D $AUTO_FIX_BRANCH || true # 顺手清理本地内存中的临时分支环境
                    # ==== breaking change 自动修复 END ====
          
                    # 固定通知分支命名，取消生成无意义的时间戳，防止每小时触发一次 PR 的重复“开关”通知轰炸
                    TEMP_BR="sync-alert-${LOCAL_BR}"
                    git checkout -B $TEMP_BR upstream/$UP_BR
                    git push origin $TEMP_BR --force # 静默强推刷新代码对照线
          
                    # 检查当前分支是否已经存在处于开启状态的冲突 PR
                    PR_EXISTS=$(gh pr list --repo "${{ matrix.fork }}" --base "$LOCAL_BR" --head "$TEMP_BR" --state open --json number --jq '. | length')
          
                    if [ "$PR_EXISTS" -eq 0 ]; then
                      # ⭐ 修复：使用 $'...' 格式实现正确的换行
                      BODY=$'自动化脚本发现上游 '"$UP_BR"$' 分支与本地 '"$LOCAL_BR"$' 分支存在冲突。\n\n**处理建议：**\n1. 在本地切换到 '"$LOCAL_BR"$' 分支。\n2. 执行 git pull upstream '"$UP_BR"$' --rebase\n3. 解决冲突后推送到 origin。\n4. 下次同步成功时，此 PR 会自动关闭并删除临时分支。'
          
                      gh pr create \
                        --repo "${{ matrix.fork }}" \
                        --base "$LOCAL_BR" \
                        --head "$TEMP_BR" \
                        --title "🚨 冲突提醒：${{ matrix.name }} [$LOCAL_BR] 同步受阻" \
                        --body "$BODY"
                      echo ">>>> [PR已创建] 请前往 GitHub 查看冲突"
                    else
                      echo ">>>> [静默更新] 冲突 PR 已存在，已为您更新最新的上游对照分支，未触发重复通知轰炸。"
                    fi
                  fi
                fi
              fi
            fi
          done
          echo ">>>> [完成] 所有映射处理完毕。"