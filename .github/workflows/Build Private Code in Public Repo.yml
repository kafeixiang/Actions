name: Infinite Free Build for Private Exclave

on:
  push:
    branches: [ "main", "dev" ]
  
  # 核心改动：配置手动触发时的自定义参数
  workflow_dispatch:
    inputs:
      target_branch:
        description: '请选择或输入要编译的私有仓 Exclave 分支'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main
          - dev-2
          - dev-3
          - dev-tuic
          # 💡 你可以在下面无限追加你已有的分支名字

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run_private_workflow_here:
    runs-on: ubuntu-24.04

    steps:
    # 1. 动态获取你选择的分支
    # 如果是点击按钮触发，就用你选的 target_branch；如果是代码 Push 自动触发，就用当前提交的分支
    - name: Checkout Private Exclave Code
      uses: actions/checkout@v4
      with:
        repository: kafeixiang/Exclave
        token: ${{ secrets.PAT_TOKEN }}
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}
        fetch-depth: 1

    # 2. 克隆该分支下的子模块
    - name: Clone Private Submodules
      run: |
        git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
        echo "==== 开始拉取子模块源码 ===="
        git submodule update --init --recursive --depth=1

    # 3. 搬迁私有仓所需的基础环境（Java 21 + Go 1.26）
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'

    # 4. 配置 Go 环境
    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
        cache: false

    # 5. 配置新版 Go Mobile 与 NDK 运行环境
    - name: Set up Go Mobile & NDK
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
        
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH
        $HOME/go/bin/gomobile init

    # 6. 仅生成配置文件
    - name: Prepare Local Properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

    # 7. 执行编译
    - name: Execute Exclave Native Build Script
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    # 8. 上传编译产物
    - name: Upload APK Artifacts to Public Actions
      uses: actions/upload-artifact@v4
      with:
        name: Exclave-Free-Build-APKs
        path: |
          app/build/outputs/apk/release/*.apk
        if-no-files-found: error
