name: Build Exclave App (Cache Disabled)

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '想要编译的分支名称 (例如: dev, main)'
        required: true
        default: 'dev'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 初始化环境：配置 Java 21（不使用自动缓存）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. 初始化环境：配置 Go 1.26（显式关闭自动缓存，防止找不到 go.sum 报错）
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      # 3. 初始化环境：配置 Android SDK & NDK
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 37
          build-tools: 37.0.0
          ndk-version: r29

      # 4. 手动安全克隆主仓与子模块
      - name: Manual Clone Target Repo with Submodules
        env:
          MY_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "==== 开始手动克隆主仓库 ===="
          git clone --depth=1 --branch ${{ github.event.inputs.branch_name }} https://${{ env.MY_TOKEN }}@://github.com Exclave-Project
          
          cd Exclave-Project
          
          echo "==== 注入子模块凭证并拉取 ===="
          git config --global url."https://${{ env.MY_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      # 5. 安装并初始化 Go Mobile 工具
      - name: Install and Init Go Mobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          $HOME/go/bin/gomobile init -ndk $ANDROID_NDK_ROOT

      # 6. 执行全套编译流程
      - name: Build Project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          cd Exclave-Project
          
          chmod +x gradlew run library/core/build.sh
          
          # 写入打包属性
          echo "KEYSTORE_PASS=android" > local.properties
          echo "ALIAS_NAME=androiddebugkey" >> local.properties
          echo "ALIAS_PASS=android" >> local.properties
          
          echo "==== Step 1: 编译底层 libexclavecore ===="
          ./run lib core
          
          echo "==== Step 2: 下载及更新 Geo 资源资产 ===="
          ./gradlew :app:downloadAssets
          ./gradlew :app:updateAssets
          
          echo "==== Step 3: 最终打包 Android APK ==="
          ./gradlew :app:assembleOssRelease

      # 7. 收集并上传编译产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exclave-APK-${{ github.event.inputs.branch_name }}
          path: Exclave-Project/app/build/outputs/apk/oss/release/*.apk
