name: Build Private Code in Public Repo

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

# 强制所有的 JavaScript Actions 运行在 Node.js 24 上（双重保险）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build_using_native_script:
    runs-on: ubuntu-24.04

    steps:
    # 1. 升级到 v4 (支持最新 Node 运行时) 并拉取代码
    - name: Run actions/checkout@v4
      uses: actions/checkout@v4
      with:
        repository: kafeixiang/Exclave
        token: ${{ secrets.YOUR_GITHUB_TOKEN }} # 请确保在 Secrets 中配置了正确的 Token
        ref: dev
        fetch-depth: 1

    # 2. 拉取子模块源码
    - name: Clone Submodules
      run: |
        git config --global url."https://${{ secrets.YOUR_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
        echo "==== 开始拉取子模块源码 ===="
        git submodule update --init --recursive --depth=1

    # 3. 升级到 v4 (支持最新 Node 运行时) 配置 Java 环境
    - name: Run actions/setup-java@v4
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        java-package: jdk

    # 4. 升级到 v5 (支持最新 Node 运行时) 配置 Go 环境
    - name: Run actions/setup-go@v5
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
        cache: false

    # 5. 配置 Android NDK 与 Go Mobile (已修复 gomobile init 报错)
    - name: Set up Go Mobile and NDK
      run: |
        # 自动获取并设置最新的 NDK 路径
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
        
        # 安装最新版 gomobile
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH
        
        # 核心修复：新版 gomobile 已经不需要并移除了 -ndk 参数，直接运行 init 即可
        $HOME/go/bin/gomobile init

    # 6. 你的后续编译或构建步骤（根据你的实际脚本往后加）
    - name: Build Project
      run: |
        echo "开始编译..."
        # 在这里写你的编译命令，例如 ./gradlew assembleRelease 或 gomobile bind
