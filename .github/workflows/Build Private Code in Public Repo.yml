name: Build Private Code in Public Repo (Dynamic Workflow Engine)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: '🚀 选择【目标私有项目】'
        required: true
        default: 'kafeixiang/husi'
        type: choice
        options:
          - 'kafeixiang/husi'
          - 'kafeixiang/Exclave'
          - 'kafeixiang/ClashMetaForAndroid'
          - 'kafeixiang/v2rayNG'
          - 'kafeixiang/NekoBoxForAndroid'
          - 'kafeixiang/FlClash'
          - 'kafeixiang/v2rayN'
          - 'kafeixiang/sing-box'
          - 'kafeixiang/mihomo'
          - 'kafeixiang/Xray'

      branch_preset:
        description: '🌿 选择【常用分支】(若选最后一项，则在下方手动输入)'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'main'
          - 'master'
          - 'dev-yl2-vless-xhttp'
          - 'FlClash'
          - 'Alpha'
          - 'CUSTOM_INPUT_BOX'

      custom_branch:
        description: '✍️ 手动输入【自定义分支】(仅在上方选择 CUSTOM_INPUT_BOX 时生效)'
        required: false
        default: ''
        type: string

      build_mode:
        description: '🛠️ 选择【编译流剧本】(自适应匹配原厂发布模式)'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'build'
          - 'debug'
          - 'nightly'
          - 'mac'
          - 'desktop'

      target_platform:
        description: '💻 目标系统 (仅对包含多平台矩阵的项目生效)'
        required: true
        default: 'android'
        type: choice
        options:
          - 'android'
          - 'macos'
          - 'windows'
          - 'linux'

      target_arch:
        description: '🏗️ 目标架构 (选择 all 将自动触发三个架构循环各编译一个)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'arm64'
          - 'amd64'
          - 'arm'

      upload_to_release:
        description: '📦 是否同步上架到公开库的 Release 页面 (默认不上传)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  setup_matrix:
    runs-on: ubuntu-latest
    outputs:
      os_runner: ${{ steps.set_os.outputs.os_runner }}
    steps:
      - id: set_os
        run: |
          REPO="${{ github.event.inputs.repo }}"
          MODE="${{ github.event.inputs.build_mode }}"
          PLAT="${{ github.event.inputs.target_platform }}"
          
          if echo "$REPO" | grep -q "v2rayN"; then
            echo "os_runner=windows-latest" >> $GITHUB_OUTPUT
          elif [ "$PLAT" = "windows" ] && ! echo "$REPO" | grep -q "husi"; then
            echo "os_runner=windows-latest" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "mac" ] || [ "$PLAT" = "macos" ]; then
            if echo "$REPO" | grep -q "husi"; then
              echo "os_runner=ubuntu-24.04" >> $GITHUB_OUTPUT
            else
              echo "os_runner=macos-latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "os_runner=ubuntu-24.04" >> $GITHUB_OUTPUT
          fi

  build_using_native_script:
    needs: setup_matrix
    runs-on: ${{ needs.setup_matrix.outputs.os_runner }}

    steps:
      # 1. 智能合流
      - name: Parse Selection
        id: parse
        shell: bash
        run: |
          REPO="${{ github.event.inputs.repo }}"
          PRESET="${{ github.event.inputs.branch_preset }}"
          CUSTOM="${{ github.event.inputs.custom_branch }}"
          
          if [ "$PRESET" = "CUSTOM_INPUT_BOX" ]; then
            BRANCH="$CUSTOM"
          else
            BRANCH="$PRESET"
          fi
          
          if [ -z "$BRANCH" ]; then
            echo "❌ 错误：你选择了手动输入分支，但下方的自定义输入框留空了！"
            exit 1
          fi
          
          PROJECT_NAME=$(echo "$REPO" | cut -d'/' -f2)
          
          echo "TARGET_REPO=$REPO" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "TARGET_PLATFORM=${{ github.event.inputs.target_platform }}" >> $GITHUB_ENV
          echo "BUILD_MODE=${{ github.event.inputs.build_mode }}" >> $GITHUB_ENV

      # 2. 检出目标私有仓库
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 3. 剧本锁定与环境参数抓取
      - name: Select Compilation Workflow and Extract Versions
        id: extract_env
        shell: bash
        run: |
          GO_VER="1.23.x"
          JAVA_VER="17"
          DOTNET_VER="8.0.x"
          FLUTTER_VER="3.44.4"
          CHOSEN_WF=""
          
          PROJECT="${{ env.PROJECT_NAME }}"
          MODE="${{ env.BUILD_MODE }}"
          PLAT="${{ env.TARGET_PLATFORM }}"
          
          echo ">>>> 📡 正在加载原厂核心地图进行强匹配路由..."
          
          if [ "$MODE" = "build" ]; then
            if [ -f ".github/workflows/build.yaml" ]; then
              CHOSEN_WF=".github/workflows/build.yaml"
            elif [ -f ".github/workflows/build.yml" ]; then
              CHOSEN_WF=".github/workflows/build.yml"
            fi
          fi

          if [ -z "$CHOSEN_WF" ]; then
            case "$PROJECT" in
              "FlClash")
                if [ -f ".github/workflows/build.yaml" ]; then
                  CHOSEN_WF=".github/workflows/build.yaml"
                elif [ -f ".github/workflows/build.yml" ]; then
                  CHOSEN_WF=".github/workflows/build.yml"
                fi
                ;;
              "v2rayN"|"v2rayNG")
                CHOSEN_WF=".github/workflows/build.yml"
                ;;
              "ClashMetaForAndroid")
                if [ "$MODE" = "debug" ]; then
                  CHOSEN_WF=".github/workflows/build-debug.yaml"
                elif [ "$MODE" = "nightly" ]; then
                  CHOSEN_WF=".github/workflows/build-pre-release.yaml"
                else
                  CHOSEN_WF=".github/workflows/build-release.yaml"
                fi
                ;;
              "NekoBoxForAndroid")
                if [ "$MODE" = "debug" ] || [ "$MODE" = "nightly" ]; then
                  CHOSEN_WF=".github/workflows/preview.yml"
                else
                  CHOSEN_WF=".github/workflows/SSR.yml"
                fi
                ;;
              "husi")
                if [ "$PLAT" = "macos" ] || [ "$PLAT" = "windows" ] || [ "$MODE" = "mac" ] || [ "$MODE" = "desktop" ]; then
                  if [ -f ".github/workflows/desktop.yml" ]; then
                    CHOSEN_WF=".github/workflows/desktop.yml"
                  elif [ -f ".github/workflows/mac.yml" ]; then
                    CHOSEN_WF=".github/workflows/mac.yml"
                  elif [ -f ".github/workflows/desktop.yaml" ]; then
                    CHOSEN_WF=".github/workflows/desktop.yaml"
                  else
                    for f in .github/workflows/*.yml .github/workflows/*.yaml; do
                      if grep -q "Build Desktop" "$f" 2>/dev/null; then
                        CHOSEN_WF="$f"; break
                      fi
                    done
                  fi
                elif [ "$MODE" = "nightly" ] && [ -f ".github/workflows/nightly.yml" ]; then
                  CHOSEN_WF=".github/workflows/nightly.yml"
                elif [ -f ".github/workflows/release.yml" ]; then
                  CHOSEN_WF=".github/workflows/release.yml"
                elif [ -f ".github/workflows/build.yaml" ]; then
                  CHOSEN_WF=".github/workflows/build.yaml"
                fi
                ;;
              "Exclave")
                if [ "$MODE" = "debug" ] && [ -f ".github/workflows/debug.yml" ]; then
                  CHOSEN_WF=".github/workflows/debug.yml"
                elif [ -f ".github/workflows/release.yml" ]; then
                  CHOSEN_WF=".github/workflows/release.yml"
                elif [ -f ".github/workflows/build.yaml" ]; then
                  CHOSEN_WF=".github/workflows/build.yaml"
                fi
                ;;
            esac
          fi
          
          if [ -z "$CHOSEN_WF" ] || [ ! -f "$CHOSEN_WF" ]; then
            echo ">>>> ⚠️ 当前项目未命中硬编码地图，正在执行全自动化特征层扫描..."
            if [ -d ".github/workflows" ]; then
              FILES=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || true)
              for f in $FILES; do
                fname=$(basename "$f" | tr '[:upper:]' '[:lower:]')
                if [[ "$fname" == *"$MODE"* || "$fname" == *"$PLAT"* ]]; then
                  if [[ "$fname" != *"lint"* && "$fname" != *"test"* && "$fname" != *"stale"* && "$fname" != *"cleanup"* && "$fname" != *"format"* ]]; then
                    CHOSEN_WF="$f"; break
                  fi
                fi
              done
              if [ -z "$CHOSEN_WF" ]; then
                for f in $FILES; do
                  fname=$(basename "$f" | tr '[:upper:]' '[:lower:]')
                  if [[ "$fname" == *"build"* || "$fname" == *"apk"* || "$fname" == *"compile"* || "$fname" == *"ci"* || "$fname" == *"desktop"* ]]; then
                    if [[ "$fname" != *"lint"* && "$fname" != *"test"* && "$fname" != *"stale"* && "$fname" != *"cleanup"* && "$fname" != *"format"* ]]; then
                      CHOSEN_WF="$f"; break
                    fi
                  fi
                done
              fi
              [ -z "$CHOSEN_WF" ] && CHOSEN_WF=$(echo "$FILES" | head -n 1)
            fi
          fi
          
          if [ ! -z "$CHOSEN_WF" ] && [ -f "$CHOSEN_WF" ]; then
            echo ">>>> 🎯 导航闭环！成功锁定本次编译的原厂剧本: $CHOSEN_WF"
            echo "CHOSEN_WORKFLOW=$CHOSEN_WF" >> $GITHUB_ENV
          
            FROM_WF_GO=$(grep -oP 'go-version:\s*[\x27\x22]?\K[0-9\.]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 || true)
            if [ ! -z "$FROM_WF_GO" ]; then
              [[ "$FROM_WF_GO" =~ ^[0-9]+\.[0-9]+$ ]] && FROM_WF_GO="${FROM_WF_GO}.x"
              GO_VER="$FROM_WF_GO"
            fi
            FROM_WF_JAVA=$(grep -oP 'java-version:\s*[\x27\x22]?\K[0-9\x27\x22]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 | tr -d "'\"" || true)
            [ ! -z "$FROM_WF_JAVA" ] && JAVA_VER="$FROM_WF_JAVA"
            FROM_WF_DOTNET=$(grep -oP 'dotnet-version:\s*[\x27\x22]?\K[0-9\.]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 || true)
            [ ! -z "$FROM_WF_DOTNET" ] && DOTNET_VER="$FROM_WF_DOTNET"

            FROM_WF_FLUTTER=$(grep -oP 'FLUTTER_VERSION:\s*[\x27\x22]?\K[0-9\.]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 || true)
            [ ! -z "$FROM_WF_FLUTTER" ] && FLUTTER_VER="$FROM_WF_FLUTTER"

            if grep -q "setup-zig" "$CHOSEN_WF"; then
              ZIG_V=$(grep -A 3 "setup-zig" "$CHOSEN_WF" | grep "version:" | head -n 1 | awk '{print $2}' | tr -d "'\"" || true)
              [ -z "$ZIG_V" ] && ZIG_V="0.13.0"
              echo "HAS_ZIG=true" >> $GITHUB_ENV
              echo "DYNAMIC_ZIG=$ZIG_V" >> $GITHUB_ENV
            fi
          else
            echo "❌ 致命错误：无论通过地图还是特征扫描，均无法找到目标编译流文件！"
            exit 1
          fi
          
          if [ -f "go.mod" ] && [ "$GO_VER" = "1.23.x" ]; then
            GO_MOD_V=$(awk '/^go [0-9]/ {print $2}' go.mod)
            [ ! -z "$GO_MOD_V" ] && GO_VER="${GO_MOD_V}.x"
          fi
          
          echo ">>>> [智能匹配成功] DYNAMIC 环境参数解锁：Go=$GO_VER, Java=$JAVA_VER, .NET=$DOTNET_VER, Flutter=$FLUTTER_VER"
          echo "DYNAMIC_GO=$GO_VER" >> $GITHUB_ENV
          echo "DYNAMIC_JAVA=$JAVA_VER" >> $GITHUB_ENV
          echo "DYNAMIC_DOTNET=$DOTNET_VER" >> $GITHUB_ENV
          echo "DYNAMIC_FLUTTER=$FLUTTER_VER" >> $GITHUB_ENV

      # 4. 递归拉取底层子模块
      - name: Clone Submodules
        shell: bash
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # 5. 配置 Zig 环境
      - name: Set up Zig Toolchain
        if: env.HAS_ZIG == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.DYNAMIC_ZIG }}

      # 6. 配置 Java 环境
      - name: Set up Java Runtime
        if: env.PROJECT_NAME != 'v2rayN'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.DYNAMIC_JAVA }}
          distribution: 'temurin'

      # 7. 配置 Go 环境
      - name: Set up Go Runtime
        if: env.PROJECT_NAME == 'Exclave' || env.PROJECT_NAME == 'NekoBoxForAndroid' || env.PROJECT_NAME == 'husi' || env.PROJECT_NAME == 'ClashMetaForAndroid' || env.PROJECT_NAME == 'FlClash' || env.PROJECT_NAME == 'sing-box' || env.PROJECT_NAME == 'mihomo' || env.PROJECT_NAME == 'Xray'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.DYNAMIC_GO }}
          cache: true
          cache-dependency-path: "**/*go.sum"

      # 8. 挂载 Gradle 编译缓存
      - name: Setup Gradle Cache for Fast Build
        if: env.PROJECT_NAME != 'v2rayN' && env.PROJECT_NAME != 'FlClash'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      # 9. 配置 .NET / Flutter 环境
      - name: Set up .NET SDK
        if: env.PROJECT_NAME == 'v2rayN'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DYNAMIC_DOTNET }}

      - name: Set up Flutter
        if: env.PROJECT_NAME == 'FlClash'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.DYNAMIC_FLUTTER }}
          channel: 'stable'
          cache: true

      # 10. 挂载 Android 本地映射属性
      - name: Prepare Local Properties
        if: env.PROJECT_NAME != 'v2rayN' && env.TARGET_PLATFORM == 'android'
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n 1 || echo "")
          if [ ! -z "$NDK_PATH" ]; then
            echo "ndk.dir=$NDK_PATH" >> local.properties
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          fi

      # 11. 强隔离 JSON 指令抽取官（跨平台零依赖）
      - name: High-Fidelity Translate and Generate Build Script
        shell: bash
        run: |
          command -v yq &>/dev/null || brew install yq 2>/dev/null || true
          yq eval -o=json '.' "$CHOSEN_WORKFLOW" > workflow.json
          
          python3 << 'EOF'
          import json, re, os

          target_platform = os.environ.get("TARGET_PLATFORM", "android").lower()
          target_branch = os.environ.get("TARGET_BRANCH", "dev")

          if not os.path.exists("workflow.json"):
              print("❌ JSON 转换失败！")
              exit(1)

          with open("workflow.json", "r", encoding="utf-8") as f:
              wf = json.load(f)

          jobs = wf.get("jobs", {})
          extracted_cmds = []

          mapping = {
              "matrix.platform": "$MATRIX_PLATFORM",
              "matrix.arch": "$MATRIX_ARCH",
              "matrix.target": "$MATRIX_ARCH",
              "steps.project_version.outputs.version": "$VERSION",
              "steps.version.outputs.go_version": "$GO_VERSION",
              "env.DARWIN_SDKROOT": "$DARWIN_SDKROOT",
              "env.RELEASE_TAG": "$RELEASE_TAG",
              "env.FILE_SUFFIX": "$FILE_SUFFIX",
              "github.token": "$GH_TOKEN",
              "github.ref": "$GITHUB_REF",
              "github.ref_name": "$TARGET_BRANCH"
          }

          pat = r"\$" + r"\{\{\s*(.*?)\s*\}\}"

          for job_key, job_val in jobs.items():
              if not isinstance(job_val, dict):
                  continue
              steps = job_val.get("steps", [])
              if not steps:
                  continue
          
              for step in steps:
                  if not isinstance(step, dict):
                      continue
                  run_cmd = step.get("run")
                  if not run_cmd:
                      continue
          
                  step_if = str(step.get("if", "")).lower()
          
                  if "matrix.platform == 'macos'" in step_if or 'matrix.platform == "macos"' in step_if or "matrix.platform=='macos'" in step_if or "matrix.platform,'macos'" in step_if:
                      if target_platform != "macos":
                          continue
                  elif "matrix.platform == 'windows'" in step_if or 'matrix.platform == "windows"' in step_if or "matrix.platform=='windows'" in step_if or "matrix.platform,'windows'" in step_if:
                      if target_platform != "windows":
                          continue
                  elif "matrix.platform == 'android'" in step_if or 'matrix.platform == "android"' in step_if or "matrix.platform=='android'" in step_if or "matrix.platform,'android'" in step_if:
                      if target_platform != "android":
                          continue
          
                  lines = run_cmd.splitlines()
                  for line in lines:
                      def repl(m):
                          k = m.group(1).strip()
                          return mapping.get(k, m.group(0))
          
                      line = re.sub(pat, repl, line)
                      line = re.sub(r"\$\{\{\s*.*?\s*\}\}", "", line)
          
                      if re.match(r"^\s*cd\s+", line):
                          tdir = line.strip().split(maxsplit=1)[1]
                          line = f"mkdir -p {tdir} 2>/dev/null; cd {tdir} || true"
          
                      extracted_cmds.append(line)

                      if ">> $GITHUB_ENV" in line or ">> \"$GITHUB_ENV\"" in line:
                          extracted_cmds.append("source $GITHUB_ENV 2>/dev/null || true")

          with open("extracted_steps.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(extracted_cmds) + "\n")
          EOF
          
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo -e "export GITHUB_ENV=\$(mktemp)\nexport GITHUB_OUTPUT=\$(mktemp)\nexport IS_STABLE='false'\n\$MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\n\$MATRIX_ARCH='${{ github.event.inputs.target_arch }}'\n\$GH_TOKEN='${{ secrets.PAT_TOKEN }}'\n" > dynamic_run.ps1
            cat extracted_steps.txt >> dynamic_run.ps1
            echo ">>>> [Windows 翻译官] 原厂表达式在线翻译成功！"
          else
            if [ "${{ github.event.inputs.target_arch }}" = "all" ]; then
              echo -e "#!/bin/bash\nexport GITHUB_ENV=\$(mktemp)\nexport GITHUB_OUTPUT=\$(mktemp)\nexport CGO_ENABLED=1\nexport IS_STABLE='false'\nexport GRADLE_OPTS=\"-Xmx4g\"\nexport MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\nexport GH_TOKEN='${{ secrets.PAT_TOKEN }}'\nexport GITHUB_REF='refs/heads/${{ env.TARGET_BRANCH }}'\nexport TARGET_BRANCH='${{ env.TARGET_BRANCH }}'\n" > dynamic_run.sh
            else
              echo -e "#!/bin/bash\nexport GITHUB_ENV=\$(mktemp)\nexport GITHUB_OUTPUT=\$(mktemp)\nexport CGO_ENABLED=1\nexport IS_STABLE='false'\nexport GRADLE_OPTS=\"-Xmx4g\"\nexport MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\nexport MATRIX_ARCH='${{ github.event.inputs.target_arch }}'\nexport GH_TOKEN='${{ secrets.PAT_TOKEN }}'\nexport GITHUB_REF='refs/heads/${{ env.TARGET_BRANCH }}'\nexport TARGET_BRANCH='${{ env.TARGET_BRANCH }}'\n" > dynamic_run.sh
            fi
            cat extracted_steps.txt >> dynamic_run.sh
            chmod +x dynamic_run.sh
            echo ">>>> [Unix 翻译官] 原厂表达式在线翻译成功！"
          fi

      # 12-A. Unix 跑道执行
      - name: Execute Dynamic Build Process [Linux / macOS Runner]
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          echo "=========================================="
          echo "🚀 正在使用公开库免费算力，动态重放原厂打包指令..."
          echo "   目标平台: ${{ github.event.inputs.target_platform }}"
          echo "=========================================="
          mkdir -p temp_staging
          
          if [ "${{ env.PROJECT_NAME }}" = "husi" ] || [ "${{ env.PROJECT_NAME }}" = "sing-box" ]; then
            if [ "${{ env.TARGET_PLATFORM }}" = "android" ] && [ ! -f "composeApp/libs/libcore.aar" ]; then
              echo ">>>> 🔧 检测到底层 libcore.aar 缺失，优先触发核心内核编译..."
              [ -f "buildScript/lib/core.sh" ] && bash buildScript/lib/core.sh || true
            fi
          fi

          if [ "${{ github.event.inputs.target_arch }}" = "all" ]; then
            ANY_SUCCESS=false
            for arch in arm64 amd64 arm; do
              export MATRIX_ARCH=$arch
              echo ">>>> 🔄 [矩阵编译中] 当前目标架构: $arch"
          
              if ./dynamic_run.sh; then
                ANY_SUCCESS=true
                echo ">>>> ✅ 架构 $arch 编译成功！暂存产物中..."
                find . -type f \( -name "*.apk" -o -name "*.aar" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.exe" \) ! -path "./temp_staging/*" ! -path "./unified_dist/*" -exec cp {} temp_staging/ \; 2>/dev/null || true
              else
                echo "⚠️ 架构 $arch 编译尝试完毕，检索暂存目录..."
              fi
            done
          else
            ./dynamic_run.sh
          fi

      # 12-B. Windows 跑道执行
      - name: Execute Dynamic Build Process [Windows Runner]
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          .\dynamic_run.ps1

      # ⭐ 12-C. 新增核心黑科技：macOS 自动化 DMG 镜像压制引擎（彻底解决只产出 .zip / .app 的痛点）
      - name: Auto Package macOS App into DMG
        if: env.TARGET_PLATFORM == 'macos'
        shell: bash
        run: |
          echo ">>>> 🍏 正在校验并确保 macOS DMG 镜像产物..."
          mkdir -p dist
          
          DMG_FILE=$(find . -name "*.dmg" -type f ! -path "./unified_dist/*" ! -path "*/.git/*" | head -n 1)
          
          if [ -n "$DMG_FILE" ]; then
            echo ">>>> ✅ 原厂已直接生成 DMG 文件: $DMG_FILE"
          else
            echo ">>>> 🔨 未直接找到 .dmg 镜像，自动启动 macOS DMG 强行压制引擎..."
            APP_PATH=$(find . -name "*.app" -type d ! -path "*/.git/*" ! -path "*/Pods/*" ! -path "*/DerivedData/*" | head -n 1)
          
            if [ -z "$APP_PATH" ]; then
              ZIP_PATH=$(find . -name "*.zip" ! -path "*/.git/*" ! -path "*/.pub-cache/*" | head -n 1)
              if [ -n "$ZIP_PATH" ]; then
                echo ">>>> 📦 找到打包的 ZIP 文件 [$ZIP_PATH]，正在解压提取 .app 程序包..."
                mkdir -p temp_app_unzip
                unzip -q "$ZIP_PATH" -d temp_app_unzip || true
                APP_PATH=$(find temp_app_unzip -name "*.app" -type d | head -n 1)
              fi
            fi
          
            if [ -n "$APP_PATH" ]; then
              APP_NAME=$(basename "$APP_PATH" .app)
              FINAL_DMG="dist/${APP_NAME}-macOS.dmg"
              echo ">>>> 🚀 正在将应用 [$APP_PATH] 转化为标准 Mac 安装盘: $FINAL_DMG"
          
              if command -v hdiutil &> /dev/null; then
                hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$FINAL_DMG"
                echo ">>>> 🎉 hdiutil 打包 DMG 成功！"
              elif command -v genisoimage &> /dev/null; then
                genisoimage -V "$APP_NAME" -D -R -apple -o "$FINAL_DMG" "$APP_PATH" || true
              fi
            else
              echo "⚠️ 未找到任何 .app 程序实体包，无法自动合成 DMG。"
            fi
          fi

      # 13. 平台精准对号入座脱壳机
      - name: Flatten and Clean Output Binaries via Platform-Aware Python Filter
        shell: python
        run: |
          import os
          import shutil
          import re

          project_name = os.environ.get("PROJECT_NAME", "").lower()
          platform = os.environ.get("TARGET_PLATFORM", "android").lower()
          
          root_word = project_name.replace("forandroid", "").replace("for_android", "").replace("-android", "").replace("desktop", "").replace("_merge", "")
          root_word_clean = re.sub(r'[-_\s]', '', root_word)
          
          target_dir = "unified_dist"
          os.makedirs(target_dir, exist_ok=True)

          platform_ext_map = {
              "android": (".apk", ".aab", ".aar"),
              "macos": (".dmg", ".pkg", ".zip", ".tar.gz"),
              "windows": (".exe", ".msi", ".zip"),
              "linux": (".appimage", ".deb", ".rpm", ".tar.gz", ".zip")
          }

          allowed_exts = platform_ext_map.get(platform, (".apk", ".aab", ".dmg", ".zip", ".tar.gz", ".aar", ".exe"))
          ignored_dirs = [".git", ".gradle", "gradle-wrapper", "node_modules", "intermediates", "build-cache", "cache", "tmp", "temp", "mock", "test", "tests", "obj"]

          print(f">>>> 🔍 平台精准滤网激活！目标平台: [{platform}], 允许格式: {allowed_exts}, 匹配字根: [{root_word_clean}]")

          all_found_files = []

          for root, dirs, files in os.walk("."):
              if any(ignored in root.replace("\\", "/").split("/") for ignored in ignored_dirs):
                  continue
              if target_dir in root:
                  continue
              for file in files:
                  if file.lower().endswith(allowed_exts):
                      if platform in ["macos", "windows", "linux"] and file.lower().endswith((".apk", ".aab")):
                          continue
                      full_p = os.path.join(root, file)
                      all_found_files.append((full_p, file))

          print(f">>>> 📁 [全盘扫描结果] 共发现 {len(all_found_files)} 个符合平台的潜在二进制文件：")
          for full_p, f in all_found_files:
              print(f"   - {full_p}")

          collected_count = 0
          for full_p, file in all_found_files:
              file_clean = re.sub(r'[-_\s]', '', file.lower())
              is_match = False
          
              if root_word_clean in file_clean:
                  is_match = True
              elif len(root_word_clean) >= 4 and root_word_clean[:4] in file_clean:
                  is_match = True
              elif any(k in file_clean for k in ["release", "unsigned", "installer", "desktop", "mac"]) and any(k in full_p.lower() for k in ["outputs/", "bin/", "dist/", "packages", "libs", "temp_staging", "build/"]):
                  is_match = True
          
              if is_match:
                  dest_path = os.path.join(target_dir, file)
                  shutil.copy2(full_p, dest_path)
                  print(f"-> [💥 平台指纹命中] {file} => 写入 => {target_dir}")
                  collected_count += 1

          if collected_count == 0:
              print(">>>> ⚠️ 指纹未直接命中，触发平台保底搜刮机制（Fallback）...")
              for full_p, file in all_found_files:
                  dest_path = os.path.join(target_dir, file)
                  shutil.copy2(full_p, dest_path)
                  print(f"-> [🛡️ 平台保底搜刮成功] {file} => 写入 => {target_dir}")

      # ⭐ 14. 联动发布（重构：多源版本号提取官，完美生成如 FlClash-dev-core-v0.8.8 的精纯 Tag）
      - name: Push and Publish to Public Repo Release Page
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -d "unified_dist" ] && [ "$(ls -A unified_dist 2>/dev/null)" ]; then
            CLEAN_BRANCH=$(echo "${{ env.TARGET_BRANCH }}" | tr '/' '-')
          
            VERSION=$(python3 << 'EOF'
          import os, re

          def extract_version():
              noise = {"arm64", "amd64", "arm", "x86", "x86_64", "v8a", "v7a", "unsigned", "release", "desktop", "windows", "macos", "linux", "android", "foss", "oss", "pkg", "dmg", "apk", "zip"}
              files = os.listdir("unified_dist") if os.path.exists("unified_dist") else []
          
              # 1. 扫描 unified_dist 文件名中的 X.Y.Z 规范版本号
              for f in files:
                  m = re.search(r'v?(\d+\.\d+\.\d+(?:[-.][a-zA-Z0-9.]+)*)', f, re.IGNORECASE)
                  if m:
                      raw_v = m.group(1)
                      parts = raw_v.split('-')
                      clean_p = [p for p in parts if p.lower() not in noise]
                      v = "-".join(clean_p)
                      if v:
                          return v

              # 2. 从 husi / Android 配置文件读取
              if os.path.exists("husi.properties"):
                  with open("husi.properties", "r", encoding="utf-8", errors="ignore") as fp:
                      for line in fp:
                          if line.startswith("VERSION_NAME="):
                              return line.split("=")[1].strip()

              # 3. 从 FlClash (pubspec.yaml) 读取
              if os.path.exists("pubspec.yaml"):
                  with open("pubspec.yaml", "r", encoding="utf-8", errors="ignore") as fp:
                      for line in fp:
                          if line.strip().startswith("version:"):
                              v = line.split(":")[1].strip().split("+")[0].strip().strip('"').strip("'")
                              if v:
                                  return v

              return ""

          print(extract_version())
          EOF
          )
          
            if [ -z "$VERSION" ]; then
              VERSION="${{ github.run_number }}"
            fi
          
            TAG_NAME="${{ env.PROJECT_NAME }}-${CLEAN_BRANCH}-v${VERSION}"
            echo ">>>> 🚀 成果对齐！已根据多源精准检索提炼 Tag 名称: $TAG_NAME"
          
            gh release create "$TAG_NAME" unified_dist/* --repo "${{ github.repository }}" --title "$TAG_NAME" --notes "Automated smart build from private upstream: ${{ env.TARGET_REPO }} [${{ env.TARGET_BRANCH }}]" --prerelease
            echo ">>>> 🎉 全线发布成功！请前往公开库 Release 页面查收！"
          else
            echo "⚠️ 未找到任何有效编译产物，跳过 Release 发布。"
          fi

      # 15. 备份层：Artifacts 平铺归档
      - name: Archive and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}--${{ env.TARGET_BRANCH }}--${{ github.event.inputs.target_platform }}--${{ github.event.inputs.target_arch }}--Artifacts
          path: unified_dist
          if-no-files-found: warn
