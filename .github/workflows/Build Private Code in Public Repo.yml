name: Build Exclave App (Submodule Optimized)

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '想要编译的分支名称 (例如: dev, main)'
        required: true
        default: 'dev'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 仅拉取主仓库代码（暂不自动递归拉取子模块，防止鉴权或网络卡死）
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: 'kafeixiang/Exclave'
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.branch_name }}
          submodules: 'false' # 更改为 false，我们在下一步手动控制
          path: 'Exclave-Project'

      # 2. 手动浅克隆子模块：使用 --depth=1 大幅减少下载量，并显式注入 Token
      - name: Initialize Submodules Manually
        run: |
          cd Exclave-Project
          # 强制将子模块的 git 链接转换为带 Token 的认证链接，防止第三方私有子仓无权限
          git config --global url."https://${{ secrets.PAT_TOKEN }}@://github.com".insteadOf "https://://github.com"
          
          echo "==== 开始快速拉取子模块 ===="
          git submodule update --init --recursive --depth=1

      # 3. 初始化环境：配置 Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. 初始化环境：配置 Go 1.26
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      # 5. 初始化环境：配置 Android SDK & NDK
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 37
          build-tools: 37.0.0
          ndk-version: r29

      # 6. 安装并初始化 Go Mobile 工具
      - name: Install and Init Go Mobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          $HOME/go/bin/gomobile init -ndk $ANDROID_NDK_ROOT

      # 7. 执行全套编译流程
      - name: Build Project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          cd Exclave-Project
          
          chmod +x gradlew run library/core/build.sh
          
          # 配置本地属性
          echo "KEYSTORE_PASS=android" > local.properties
          echo "ALIAS_NAME=androiddebugkey" >> local.properties
          echo "ALIAS_PASS=android" >> local.properties
          
          echo "==== Step 1: 编译底层 libexclavecore ===="
          ./run lib core
          
          echo "==== Step 2: 下载及更新 Geo 资源资产 ===="
          ./gradlew :app:downloadAssets
          ./gradlew :app:updateAssets
          
          echo "==== Step 3: 最终打包 Android APK ==="
          ./gradlew :app:assembleOssRelease

      # 8. 收集并上传编译产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exclave-APK-${{ github.event.inputs.branch_name }}
          path: Exclave-Project/app/build/outputs/apk/oss/release/*.apk
