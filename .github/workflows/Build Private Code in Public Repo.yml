name: Build Private Code in Public Repo

on:
  workflow_dispatch:
    inputs:
      repo_and_branch:
        description: '🚀 选择【私有项目】与【目标分支】'
        required: true
        default: 'kafeixiang/Exclave [dev]'
        type: choice
        options:
          - 'kafeixiang/Exclave [dev]'
          - 'kafeixiang/Exclave [main]'
          - 'kafeixiang/Exclave [dev-2]'
          - 'kafeixiang/Exclave [dev-3]'
          - 'kafeixiang/Exclave [dev-3-cs]'
          - 'kafeixiang/Exclave [dev-tuic]'
          - 'kafeixiang/ClashMetaForAndroid [main]'
          - 'kafeixiang/ClashMetaForAndroid [dev]'
          - 'kafeixiang/ClashMetaForAndroid [alpha]'
          - 'kafeixiang/v2rayNG [master]'
          - 'kafeixiang/v2rayNG [dev]'
          - 'kafeixiang/NekoBoxForAndroid [main]'
          - 'kafeixiang/NekoBoxForAndroid [dev]'
          - 'kafeixiang/FlClash [main]'
          - 'kafeixiang/FlClash [dev]'
          - 'kafeixiang/husi [main]'
          - 'kafeixiang/husi [master]'
          - 'kafeixiang/v2rayN [master]'
          - 'kafeixiang/v2rayN [wpf]'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  setup_matrix:
    runs-on: ubuntu-latest
    outputs:
      os_runner: ${{ steps.set_os.outputs.os_runner }}
    steps:
      - id: set_os
        run: |
          RAW="${{ github.event.inputs.repo_and_branch }}"
          if echo "$RAW" | grep -q "v2rayN"; then
            echo "os_runner=windows-latest" >> $GITHUB_OUTPUT
          else
            echo "os_runner=ubuntu-24.04" >> $GITHUB_OUTPUT
          fi

  build_using_native_script:
    needs: setup_matrix
    runs-on: ${{ needs.setup_matrix.outputs.os_runner }}

    steps:
    # 1. 解析菜单选择
    - name: Parse Selection
      id: parse
      shell: bash
      run: |
        RAW="${{ github.event.inputs.repo_and_branch }}"
        REPO=$(echo "$RAW" | awk '{print $1}')
        BRANCH=$(echo "$RAW" | grep -oP '\[\K[^\]]+')
        PROJECT_NAME=$(echo "$REPO" | cut -d'/' -f2)
        
        echo "TARGET_REPO=$REPO" >> $GITHUB_ENV
        echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV
        echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

    # 2. 检出目标私有仓库
    - name: Checkout Private Source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.TARGET_REPO }}
        token: ${{ secrets.PAT_TOKEN }}
        ref: ${{ env.TARGET_BRANCH }}
        fetch-depth: 1

    # 3. 深度递归拉取所有子模块
    - name: Clone Submodules
      shell: bash
      run: |
        git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
        git submodule update --init --recursive --depth=1

    # 4. 配置 Java 环境
    - name: Set up Java Runtime
      if: env.PROJECT_NAME != 'v2rayN'
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'

    # 5. 配置 Go 环境
    - name: Set up Go Runtime
      if: env.PROJECT_NAME == 'Exclave' || env.PROJECT_NAME == 'NekoBoxForAndroid' || env.PROJECT_NAME == 'husi' || env.PROJECT_NAME == 'ClashMetaForAndroid'
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
        cache: true 
        cache-dependency-path: "**/go.sum"

    # 6. 挂载 Gradle 编译加速缓存
    - name: Setup Gradle Cache for Fast Build
      if: env.PROJECT_NAME != 'v2rayN' && env.PROJECT_NAME != 'FlClash'
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: false 

    # 7. 配置 .NET 环境
    - name: Set up .NET SDK
      if: env.PROJECT_NAME == 'v2rayN'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 8. 配置 Flutter 环境
    - name: Set up Flutter
      if: env.PROJECT_NAME == 'FlClash'
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 9. 挂载本地 SDK/NDK 映射属性
    - name: Prepare Local Properties
      if: env.PROJECT_NAME != 'v2rayN'
      shell: bash
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n 1 || echo "")
        if [ ! -z "$NDK_PATH" ]; then
          echo "ndk.dir=$NDK_PATH" >> local.properties
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        fi

    # =================================================================
    # 执行层：无缝对齐并闭环生成各项目的底层架构
    # =================================================================
    - name: Reference and Execute Native Project Build Process
      shell: bash
      run: |
        echo "==== 正在启动原项目对齐构建线程 ===="
        
        export CGO_ENABLED=1
        export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -Dorg.gradle.jvmargs=-Xmx4g"
        
        case "${{ env.PROJECT_NAME }}" in
          
          "NekoBoxForAndroid")
            # 1. 【核心大改】强行拉取并就地现场编译 MatsuriDayo 专属魔改版 GoMobile 工具链
            echo "⚙️ 正在安装 MatsuriDayo 专属魔改版 GoMobile..."
            go install github.com/MatsuriDayo/gomobile/cmd/gomobile@latest
            go install github.com/MatsuriDayo/gomobile/cmd/gobind@latest
            echo "$HOME/go/bin" >> $GITHUB_PATH
            $HOME/go/bin/gomobile init
            
            # 给 Android Gradle 脚本对齐 Go SDK 的位置
            echo "go.dir=$(which go | sed 's/\/bin\/go//')" >> local.properties
            
            # 2. 地毯式检索并强行拉起原项目自带的 gobind 编译核心任务（会自动联动刚才安装的 Matsuri 专属工具）
            chmod +x gradlew
            echo "⚙️ 正在调用项目自带的 Gradle Go-Binding 钩子同步内核..."
            ALL_TASKS=$(./gradlew tasks --all)
            
            if echo "$ALL_TASKS" | grep -q "gobind"; then
              GOBIND_TASK=$(echo "$ALL_TASKS" | grep -oE "[a-zA-Z0-9:]*gobind" | head -n 1)
              echo "🎯 提取到内核任务: $GOBIND_TASK，正在独立执行！"
              ./gradlew $GOBIND_TASK --stacktrace || true
            fi
            
            # 3. 智能源码级检测：如果原项目要求通过特殊的 go 文件夹直接就地打包 aar
            FIND_GO_MOD=$(find . -name "go.mod" -not -path "*/build/*" | head -n 1 || echo "")
            if [ ! -z "$FIND_GO_MOD" ]; then
              GO_CORE_DIR=$(dirname "$FIND_GO_MOD")
              echo "📦 找到底层 Go 核心包源码目录: $GO_CORE_DIR，正在使用 Matsuri 魔改工具现场生成包..."
              cd $GO_CORE_DIR
              # 关键：这里使用的是已经换成 Matsuri 魔改版的 gomobile 进行 bind
              $HOME/go/bin/gomobile bind -v -androidapi 21 -target android -o libcore.aar . || true
              
              # 自动送进对应的依赖 libs 目录
              mkdir -p ../../app/libs 2>/dev/null || mkdir -p ../libs 2>/dev/null
              cp *.aar ../../app/libs/ 2>/dev/null || cp *.aar ../libs/ 2>/dev/null || true
              cd $GITHUB_WORKSPACE
            fi
            
            # 4. 执行主包编译，此时 libcore 依赖已完全闭合，且包名及方法完全对齐！
            echo "🚀 正在编译 Fdroid 渠道 Release APK..."
            ./gradlew :app:assembleFdroidRelease --stacktrace
            ;;
            
          "ClashMetaForAndroid")
            chmod +x gradlew
            if grep -q "core:assemble" build.gradle* 2>/dev/null || [ -d "core" ]; then
              ./gradlew :core:assembleRelease || echo "Skip core task"
            fi
            ./gradlew assembleRelease --stacktrace
            ;;
            
          "Exclave"|"v2rayNG"|"husi")
            chmod +x gradlew
            ./gradlew assembleRelease
            ;;
            
          "FlClash")
            if [ -f "android/app/build.gradle" ]; then
              sed -i 's/signingConfigs.release/signingConfigs.debug/g' android/app/build.gradle
            fi
            flutter pub get
            flutter build apk --release
            ;;
            
          *)
            echo "跳过 Linux 执行块"
            ;;
        esac

    # 🟢 针对 v2rayN Windows 桌面端
    - name: Execute Native Project Build Process [Windows v2rayN]
      if: env.PROJECT_NAME == 'v2rayN'
      shell: pwsh
      run: |
        dotnet restore
        dotnet publish v2rayN/v2rayN.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true

    # =================================================================
    # 产物层
    # =================================================================
    - name: Archive and Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ env.TARGET_BRANCH }}-Artifacts
        path: |
          app/build/outputs/apk/**/*.apk
          app/build/outputs/bundle/**/*.aab
          build/app/outputs/flutter-apk/*.apk
          v2rayN/bin/Release/net8.0/win-x64/publish/*
          bin/Release/net8.0/win-x64/publish/*
          *.apk
          *.aar
        if-no-files-found: warn
