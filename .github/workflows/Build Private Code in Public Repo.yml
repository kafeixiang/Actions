name: Infinite Free Build for Private Exclave

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run_private_workflow_here:
    runs-on: ubuntu-24.04

    steps:
    # 1. 使用你的 PAT_TOKEN 把私有仓库代码拉到公开虚拟机
    - name: Checkout Private Exclave Code
      uses: actions/checkout@v4
      with:
        repository: kafeixiang/Exclave
        token: ${{ secrets.PAT_TOKEN }} # 已替换
        ref: dev
        fetch-depth: 1

    # 2. 克隆私有仓的子模块
    - name: Clone Private Submodules
      run: |
        git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/" # 已替换
        echo "==== 开始拉取子模块源码 ===="
        git submodule update --init --recursive --depth=1

    # 3. 搬迁私有仓所需的基础环境（Java 21 + Go 1.26）
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'

    # 4. 配置 Go 环境
    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
        cache: false

    # 5. 配置新版 Go Mobile 与 NDK 运行环境（去除了过时的 -ndk 参数）
    - name: Set up Go Mobile & NDK
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
        
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH
        $HOME/go/bin/gomobile init

    # 6. 模拟私有构建所需的签名环境
    - name: Prepare Local Properties & Temporary Keystore
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
        
        keytool -genkey -v -keystore release.keystore -alias url_test -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass "123456" -keypass "123456" -dname "CN=Exclave, OU=Dev, O=Exclave, L=SG, S=SG, C=SG"

    # 7. 在公开仓的免费算力下执行编译
    - name: Execute Exclave Native Build Script
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    # 8. 把编译好的产物直接上传到公开仓库的 Actions 页面
    - name: Upload APK Artifacts to Public Actions
      uses: actions/upload-artifact@v4
      with:
        name: Exclave-Free-Build-APKs
        path: |
          app/build/outputs/apk/release/*.apk
        if-no-files-found: error
