name: Run Project Native Workflow

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '想要编译的分支名称 (例如: dev, main)'
        required: true
        default: 'dev'

jobs:
  build_using_native_script:
    runs-on: ubuntu-latest

    steps:
      # 1. 使用官方标准的 checkout 动作直接将私有仓克隆到当前工作区的根目录
      - name: Checkout Private Repo Code
        uses: actions/checkout@v4
        with:
          repository: 'kafeixiang/Exclave'
          # 必须使用具备该私有仓完全读取权限的 Classic PAT 令牌
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.branch_name }}
          # 彻底关闭自动子模块拉取，防止其在 checkout 插件内部引发二次鉴权死锁
          submodules: 'false'

      # 2. 核心修正：使用 Token 动态解析并拉取子模块，确保完全不弹窗卡死
      - name: Fetch Submodules Safe NPM/Git Mode
        run: |
          # 强制当前虚拟机的 git 行为：只要遇到 github.com 的请求，自动把 Token 塞进 Header 中
          git config --global url."https://${{ secrets.PAT_TOKEN }}@://github.com".insteadOf "https://://github.com"
          echo "==== 开始拉取子模块源码 ===="
          git submodule update --init --recursive --depth=1

      # 3. 借壳编译：直接执行 Exclave 项目自带的本地构建核心逻辑
      # 我们查阅了该项目的原生构建流，它主要是通过其根目录下的固化脚本和 gradlew 来驱动的
      - name: Execute Native Project Build Pipeline
        env:
          # 将系统预装的 Android 环境直接透传给项目自带的脚本
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          # 1. 赋予项目原有脚本执行权限
          chmod +x gradlew run library/core/build.sh
          
          # 2. 自动接受 Android SDK 许可协议（防止原生 Gradle 弹窗挂起）
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 3. 配置本地打包所需的临时签名秘钥
          echo "KEYSTORE_PASS=android" > local.properties
          echo "ALIAS_NAME=androiddebugkey" >> local.properties
          echo "ALIAS_PASS=android" >> local.properties
          
          # 4. 依次调用项目自带的原生构建流步骤
          echo "==== [Step 1] 执行项目原生 Golang 核心编译 ===="
          ./run lib core
          
          echo "==== [Step 2] 执行项目原生前端资源拉取 ===="
          ./gradlew :app:downloadAssets
          ./gradlew :app:updateAssets
          
          echo "==== [Step 3] 执行项目原生 Android 打包 ===="
          ./gradlew :app:assembleOssRelease

      # 4. 收集并上传编译出的 APK 安装包
      - name: Upload Output APK
        uses: actions/upload-artifact@v4
        with:
          name: Exclave-APK-${{ github.event.inputs.branch_name }}
          path: app/build/outputs/apk/oss/release/*.apk
