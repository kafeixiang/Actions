name: Build Private Code in Public Repo (Dynamic Workflow Engine)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: '🚀 选择【目标私有项目】'
        required: true
        default: 'kafeixiang/husi'
        type: choice
        options:
          - 'kafeixiang/husi'
          - 'kafeixiang/Exclave'
          - 'kafeixiang/ClashMetaForAndroid'
          - 'kafeixiang/v2rayNG'
          - 'kafeixiang/NekoBoxForAndroid'
          - 'kafeixiang/FlClash'
          - 'kafeixiang/v2rayN'
          - 'kafeixiang/sing-box'
          - 'kafeixiang/mihomo'
          - 'kafeixiang/Xray'

      branch_preset:
        description: '🌿 选择【常用分支】(若选最后一项，则在下方手动输入)'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'main'
          - 'master'
          - 'dev-yl2-vless-xhttp'
          - 'FlClash'
          - 'Alpha'
          - 'CUSTOM_INPUT_BOX'

      custom_branch:
        description: '✍️ 手动输入【自定义分支】(仅在上方选择 CUSTOM_INPUT_BOX 时生效)'
        required: false
        default: ''
        type: string

      build_mode:
        description: '🛠️ 选择【编译流剧本】(自适应匹配原厂发布模式)'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'build'
          - 'debug'
          - 'nightly'
          - 'mac'
          - 'desktop'

      target_platform:
        description: '💻 目标系统 (选择 all 将自动并行触发所有系统编译)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'android'
          - 'macos'
          - 'windows'
          - 'linux'

      target_arch:
        description: '🏗️ 目标架构 (选择 all 将自动触发三个架构循环各编译一个)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'arm64'
          - 'amd64'
          - 'arm'

      upload_to_release:
        description: '📦 是否同步上架到公开库的 Release 页面 (默认不上传)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 1. 动态生成平台与 Runner 映射矩阵
  setup_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - id: set_matrix
        run: |
          REPO="${{ github.event.inputs.repo }}"
          MODE="${{ github.event.inputs.build_mode }}"
          PLAT="${{ github.event.inputs.target_platform }}"
          
          # husi 项目全平台统一在 Linux (ubuntu-24.04) 上执行交叉编译
          get_runner() {
            local p="$1"
            if echo "$REPO" | grep -q "husi"; then
              echo "ubuntu-24.04"
            elif echo "$REPO" | grep -q "v2rayN"; then
              echo "windows-latest"
            elif [ "$p" = "windows" ]; then
              echo "windows-latest"
            elif [ "$p" = "macos" ] || [ "$MODE" = "mac" ]; then
              echo "macos-latest"
            else
              echo "ubuntu-24.04"
            fi
          }

          if [ "$PLAT" = "all" ]; then
            RUNNER_ANDROID=$(get_runner "android")
            RUNNER_MACOS=$(get_runner "macos")
            RUNNER_WINDOWS=$(get_runner "windows")
            RUNNER_LINUX=$(get_runner "linux")
          
            echo "matrix={\"include\":[{\"platform\":\"android\",\"os_runner\":\"$RUNNER_ANDROID\"},{\"platform\":\"macos\",\"os_runner\":\"$RUNNER_MACOS\"},{\"platform\":\"windows\",\"os_runner\":\"$RUNNER_WINDOWS\"},{\"platform\":\"linux\",\"os_runner\":\"$RUNNER_LINUX\"}]}" >> $GITHUB_OUTPUT
          else
            RUNNER=$(get_runner "$PLAT")
            echo "matrix={\"include\":[{\"platform\":\"$PLAT\",\"os_runner\":\"$RUNNER\"}]}" >> $GITHUB_OUTPUT
          fi

  # 2. 矩阵化并行编译任务
  build_using_native_script:
    needs: setup_matrix
    runs-on: ${{ matrix.os_runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_matrix.outputs.matrix) }}

    steps:
      # 1. 智能解析分支与参数
      - name: Parse Selection
        id: parse
        shell: bash
        run: |
          REPO="${{ github.event.inputs.repo }}"
          PRESET="${{ github.event.inputs.branch_preset }}"
          CUSTOM="${{ github.event.inputs.custom_branch }}"
          
          if [ "$PRESET" = "CUSTOM_INPUT_BOX" ]; then
            BRANCH="$CUSTOM"
          else
            BRANCH="$PRESET"
          fi
          
          if [ -z "$BRANCH" ]; then
            echo "❌ 错误：你选择了手动输入分支，但自定义分支输入框留空！"
            exit 1
          fi
          
          PROJECT_NAME=$(echo "$REPO" | cut -d'/' -f2)
          
          echo "TARGET_REPO=$REPO" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "TARGET_PLATFORM=${{ matrix.platform }}" >> $GITHUB_ENV
          echo "BUILD_MODE=${{ github.event.inputs.build_mode }}" >> $GITHUB_ENV

      # 2. 检出目标私有仓库
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          submodules: recursive
          fetch-depth: 0

      # 3. 剧本锁定与环境参数/Zig 检测
      - name: Select Compilation Workflow and Extract Versions
        id: extract_env
        shell: bash
        run: |
          GO_VER="1.23.x"
          JAVA_VER="17"
          DOTNET_VER="8.0.x"
          FLUTTER_VER="3.44.4"
          CHOSEN_WF=""
          
          PROJECT="${{ env.PROJECT_NAME }}"
          MODE="${{ env.BUILD_MODE }}"
          PLAT="${{ env.TARGET_PLATFORM }}"
          
          echo ">>>> 📡 正在针对 $PROJECT [$PLAT] 进行智能工作流配置查找..."
          
          if [ "$PROJECT" = "husi" ]; then
            if [ "$PLAT" = "macos" ] || [ "$PLAT" = "windows" ] || [ "$PLAT" = "linux" ] || [ "$MODE" = "mac" ] || [ "$MODE" = "desktop" ]; then
              if [ -f ".github/workflows/desktop.yml" ]; then CHOSEN_WF=".github/workflows/desktop.yml";
              elif [ -f ".github/workflows/desktop.yaml" ]; then CHOSEN_WF=".github/workflows/desktop.yaml";
              elif [ -f ".github/workflows/mac.yml" ]; then CHOSEN_WF=".github/workflows/mac.yml";
              fi
            fi
          fi

          if [ -z "$CHOSEN_WF" ]; then
            case "$PROJECT" in
              "FlClash")
                [ -f ".github/workflows/build.yaml" ] && CHOSEN_WF=".github/workflows/build.yaml"
                [ -f ".github/workflows/build.yml" ] && CHOSEN_WF=".github/workflows/build.yml"
                ;;
              "v2rayN"|"v2rayNG")
                CHOSEN_WF=".github/workflows/build.yml"
                ;;
              "ClashMetaForAndroid")
                [ "$MODE" = "debug" ] && CHOSEN_WF=".github/workflows/build-debug.yaml" || CHOSEN_WF=".github/workflows/build-release.yaml"
                ;;
              "NekoBoxForAndroid")
                [ "$MODE" = "debug" ] && CHOSEN_WF=".github/workflows/preview.yml" || CHOSEN_WF=".github/workflows/SSR.yml"
                ;;
            esac
          fi
          
          if [ -z "$CHOSEN_WF" ] || [ ! -f "$CHOSEN_WF" ]; then
            if [ -d ".github/workflows" ]; then
              FILES=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || true)
              for f in $FILES; do
                fname=$(basename "$f" | tr '[:upper:]' '[:lower:]')
                if [[ "$fname" == *"$MODE"* || "$fname" == *"$PLAT"* ]]; then
                  if [[ "$fname" != *"lint"* && "$fname" != *"test"* && "$fname" != *"stale"* ]]; then
                    CHOSEN_WF="$f"; break
                  fi
                fi
              done
              [ -z "$CHOSEN_WF" ] && CHOSEN_WF=$(echo "$FILES" | head -n 1)
            fi
          fi
          
          if [ -n "$CHOSEN_WF" ] && [ -f "$CHOSEN_WF" ]; then
            echo ">>>> 🎯 成功锁定目标脚本: $CHOSEN_WF"
            echo "CHOSEN_WORKFLOW=$CHOSEN_WF" >> $GITHUB_ENV
          
            # 检测是否依赖 Zig
            if grep -qi "setup-zig" "$CHOSEN_WF" || grep -qi "zig" "$CHOSEN_WF"; then
              echo "HAS_ZIG=true" >> $GITHUB_ENV
              echo "DYNAMIC_ZIG=0.13.0" >> $GITHUB_ENV
            fi
          else
            echo "❌ 致命错误：无法定位编译剧本！"
            exit 1
          fi

          echo "DYNAMIC_GO=$GO_VER" >> $GITHUB_ENV
          echo "DYNAMIC_JAVA=$JAVA_VER" >> $GITHUB_ENV
          echo "DYNAMIC_DOTNET=$DOTNET_VER" >> $GITHUB_ENV
          echo "DYNAMIC_FLUTTER=$FLUTTER_VER" >> $GITHUB_ENV

      # 4. 递归拉取底层子模块
      - name: Clone Submodules
        shell: bash
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # 5. 配置 Zig 环境（针对 husi/CGO 交叉编译必须）
      - name: Set up Zig Toolchain
        if: env.HAS_ZIG == 'true' || env.PROJECT_NAME == 'husi'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.DYNAMIC_ZIG || '0.13.0' }}

      # 6. 配置 Java 环境
      - name: Set up Java Runtime
        if: env.PROJECT_NAME != 'v2rayN'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.DYNAMIC_JAVA }}
          distribution: 'temurin'

      # 7. 配置 Go 环境
      - name: Set up Go Runtime
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.DYNAMIC_GO }}
          cache: true

      # 8. 挂载 Gradle 编译缓存
      - name: Setup Gradle Cache for Fast Build
        if: env.PROJECT_NAME != 'v2rayN' && env.PROJECT_NAME != 'FlClash'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      # 9. 针对 Android 自动补充 SDK 映射
      - name: Prepare Local Properties
        if: matrix.platform == 'android'
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n 1 || echo "")
          if [ -n "$NDK_PATH" ]; then
            echo "ndk.dir=$NDK_PATH" >> local.properties
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          fi

      # 10. YAML 步阶解析与子 Shell 隔离打包生成器
      - name: High-Fidelity Translate and Generate Build Script
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml --break-system-packages 2>/dev/null || python3 -m pip install --quiet pyyaml 2>/dev/null || true
          
          python3 << 'EOF'
          import yaml, re, os

          wf_path = os.environ.get("CHOSEN_WORKFLOW")
          target_platform = os.environ.get("TARGET_PLATFORM", "android").lower()

          with open(wf_path, "r", encoding="utf-8") as f:
              wf = yaml.safe_load(f)

          jobs = wf.get("jobs", {}) if isinstance(wf, dict) else {}
          extracted_steps = []

          mapping = {
              "matrix.platform": "$MATRIX_PLATFORM",
              "matrix.arch": "$MATRIX_ARCH",
              "matrix.target": "$MATRIX_ARCH",
              "github.token": "$GH_TOKEN",
              "github.ref": "$GITHUB_REF",
              "github.ref_name": "$TARGET_BRANCH",
              "steps.sdk.outputs.path": "/home/runner/cross-jdk/include",
              "steps.darwin-sdk.outputs.path": "/home/runner/MacOSX.sdk"
          }

          pat = r"\$" + r"\{\{\s*(.*?)\s*\}\}"

          for job_key, job_val in jobs.items():
              if not isinstance(job_val, dict): continue
              steps = job_val.get("steps", [])
              if not steps or not isinstance(steps, list): continue
          
              for step in steps:
                  if not isinstance(step, dict): continue
                  run_cmd = step.get("run")
                  if not run_cmd: continue
          
                  step_if = str(step.get("if", "")).lower()
                  # 平台逻辑简单过滤
                  if "matrix.platform == 'macos'" in step_if and target_platform != "macos": continue
                  if "matrix.platform == 'windows'" in step_if and target_platform != "windows": continue
                  if "matrix.platform == 'android'" in step_if and target_platform != "android": continue
          
                  step_lines = []
                  lines = run_cmd.splitlines()
                  for line in lines:
                      def repl(m):
                          k = m.group(1).strip()
                          return mapping.get(k, m.group(0))
          
                      line = re.sub(pat, repl, line)
                      line = re.sub(r"\$\{\{\s*.*?\s*\}\}", "", line)
                      step_lines.append(line)
          
                  if step_lines:
                      # 核心修复：用 () 子 shell 隔离每个 step 的目录和环境变量，避免 cd 污染全局路径
                      step_block = "(\n" + "\n".join(step_lines) + "\n)"
                      extracted_steps.append(step_block)

          with open("extracted_steps.txt", "w", encoding="utf-8") as f:
              f.write("\n\n".join(extracted_steps) + "\n")
          EOF
          
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo -e "\$env:GITHUB_ENV = [System.IO.Path]::GetTempFileName()\n\$env:GITHUB_OUTPUT = [System.IO.Path]::GetTempFileName()\n\$env:CGO_ENABLED = '1'\n\$env:GRADLE_OPTS = '-Xmx4g'\n\$env:MATRIX_PLATFORM = '${{ matrix.platform }}'\n\$env:GH_TOKEN = '${{ secrets.PAT_TOKEN }}'\n" > dynamic_run.ps1
            cat extracted_steps.txt >> dynamic_run.ps1
          else
            echo -e "#!/bin/bash\nexport GITHUB_ENV=\$(mktemp)\nexport GITHUB_OUTPUT=\$(mktemp)\nexport CGO_ENABLED=1\nexport GRADLE_OPTS=\"-Xmx4g\"\nexport MATRIX_PLATFORM='${{ matrix.platform }}'\nexport GH_TOKEN='${{ secrets.PAT_TOKEN }}'\nexport GITHUB_REF='refs/heads/${{ env.TARGET_BRANCH }}'\nexport TARGET_BRANCH='${{ env.TARGET_BRANCH }}'\n" > dynamic_run.sh
            cat extracted_steps.txt >> dynamic_run.sh
            chmod +x dynamic_run.sh
          fi

      # 11. 执行动态构建 (针对 husi 内核补充自动化构建保护)
      - name: Execute Dynamic Build Process
        shell: bash
        run: |
          echo "🚀 开始执行平台编译: ${{ matrix.platform }} [Runner Host: $RUNNER_OS]"
          
          # husi 底层 Go Core 缺失时的强行补全机制
          if [ "${{ env.PROJECT_NAME }}" = "husi" ]; then
            if [ "${{ matrix.platform }}" = "android" ] && [ ! -f "composeApp/libs/libcore.aar" ]; then
              echo ">>>> 🔧 [husi] 检测到底层 Android libcore.aar 缺失，启动交叉编译..."
              [ -f "buildScript/lib/core.sh" ] && bash buildScript/lib/core.sh || true
            fi
          fi

          if [ "$RUNNER_OS" = "Windows" ]; then
            pwsh .\dynamic_run.ps1
          else
            ./dynamic_run.sh
          fi

      # 12. 产物提取脱壳机
      - name: Flatten and Clean Output Binaries
        shell: python
        run: |
          import os, shutil, re

          project_name = os.environ.get("PROJECT_NAME", "").lower()
          platform = os.environ.get("TARGET_PLATFORM", "android").lower()
          
          target_dir = "unified_dist"
          os.makedirs(target_dir, exist_ok=True)

          platform_ext_map = {
              "android": (".apk", ".aab", ".aar"),
              "macos": (".dmg", ".pkg", ".zip", ".tar.gz", ".zst"),
              "windows": (".exe", ".msi", ".zip"),
              "linux": (".appimage", ".deb", ".rpm", ".tar.gz", ".zst")
          }

          allowed_exts = platform_ext_map.get(platform, (".apk", ".dmg", ".exe", ".deb", ".zip", ".zst"))
          ignored_dirs = [".git", ".gradle", "gradle-wrapper", "node_modules", "intermediates", "build-cache", "tmp", "temp"]

          print(f">>>> 🔍 提取平台 [{platform}] 产物，匹配后缀: {allowed_exts}")

          found_files = []
          for root, dirs, files in os.walk("."):
              if any(ignored in root.replace("\\", "/").split("/") for ignored in ignored_dirs): continue
              if target_dir in root: continue
              for file in files:
                  if file.lower().endswith(allowed_exts):
                      if platform in ["macos", "windows", "linux"] and file.lower().endswith((".apk", ".aab")): continue
                      found_files.append(os.path.join(root, file))

          for full_p in found_files:
              file_name = os.path.basename(full_p)
              dest_path = os.path.join(target_dir, file_name)
              shutil.copy2(full_p, dest_path)
              print(f"-> 🎯 提取成功: {file_name}")

      # 13. 同步发布至 Release 页面
      - name: Push and Publish to Release Page
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -d "unified_dist" ] && [ "$(ls -A unified_dist 2>/dev/null)" ]; then
            CLEAN_BRANCH=$(echo "${{ env.TARGET_BRANCH }}" | tr '/' '-')
            TAG_NAME="${{ env.PROJECT_NAME }}-${CLEAN_BRANCH}-${{ matrix.platform }}-v${{ github.run_number }}"
          
            gh release create "$TAG_NAME" unified_dist/* --repo "${{ github.repository }}" --title "$TAG_NAME" --notes "Automated smart build from private upstream: ${{ env.TARGET_REPO }}" --prerelease 2>/dev/null || gh release upload "$TAG_NAME" unified_dist/* --repo "${{ github.repository }}" --clobber
            echo "🎉 发布完成！"
          fi

      # 14. Artifacts 归档
      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}--${{ env.TARGET_BRANCH }}--${{ matrix.platform }}--Artifacts
          path: unified_dist
          if-no-files-found: warn