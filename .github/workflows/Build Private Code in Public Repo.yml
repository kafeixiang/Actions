name: Run Project Native Workflow

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '想要编译的分支名称 (例如: dev, main)'
        required: true
        default: 'dev'

jobs:
  build_using_native_script:
    runs-on: ubuntu-latest

    steps:
      # 1. 借用官方原生能力，使用您的 Token 完整拉取主仓库
      - name: Checkout Private Repo Code
        uses: actions/checkout@v4
        with:
          repository: 'kafeixiang/Exclave'
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.branch_name }}
          submodules: 'false' # 保持为 false，由下一步带 Token 注入安全拉取

      # 2. 安全拉取子模块（防止子模块包含私有依赖导致再次弹窗卡死）
      - name: Fetch Submodules Safe Mode
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          echo "==== 开始拉取子模块源码 ===="
          git submodule update --init --recursive --depth=1

      # 3. 补充基础依赖环境：配置 Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. 补充基础依赖环境：配置 Go 1.26
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      # 5. 安装并初始化项目急需的 Go Mobile 交叉编译工具
      - name: Install and Init Go Mobile
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
          
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          $HOME/go/bin/gomobile init -ndk $NDK_PATH

      # 6. 借壳编译：直接执行 Exclave 项目原汁原味的原生编译流程
      - name: Execute Native Project Build Pipeline
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          # 赋予项目自带的各脚本和可执行文件最高权限
          chmod +x gradlew run library/core/build.sh
          
          # 自动接受 Android SDK 协议，防止编译中途断开
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 配置打包本地环境参数（使用临时调试签名）
          echo "KEYSTORE_PASS=android" > local.properties
          echo "ALIAS_NAME=androiddebugkey" >> local.properties
          echo "ALIAS_PASS=android" >> local.properties
          
          echo "==== 1. 调用项目原生命令编译 Go 核心层 ===="
          ./run lib core
          
          echo "==== 2. 调用项目原生命令更新前端资产 ===="
          ./gradlew :app:downloadAssets
          ./gradlew :app:updateAssets
          
          echo "==== 3. 调用项目原生命令打包 Android APK ===="
          ./gradlew :app:assembleOssRelease

      # 7. 收集并上传编译出的安装包
      - name: Upload Output APK
        uses: actions/upload-artifact@v4
        with:
          name: Exclave-APK-${{ github.event.inputs.branch_name }}
          path: app/build/outputs/apk/oss/release/*.apk
