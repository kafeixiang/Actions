name: Build Private Code in Public Repo

on:
  push:
    branches: [ "main", "dev" ]
  
  # 手动触发时可选分支
  workflow_dispatch:
    inputs:
      target_branch:
        description: '请选择或输入要编译的私有仓 Exclave 分支'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main
          - dev-2
          - dev-3
          - dev-3-cs # 👈 已成功为你添加该分支
          - dev-tuic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build_using_native_script:
    runs-on: ubuntu-24.04

    steps:
    # 1. 动态获取你选择的分支
    - name: Checkout Private Exclave Code
      uses: actions/checkout@v4
      with:
        repository: kafeixiang/Exclave
        token: ${{ secrets.PAT_TOKEN }}
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}
        fetch-depth: 1

    # 2. 克隆该分支下的子模块
    - name: Clone Private Submodules
      run: |
        git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
        echo "==== 开始拉取子模块源码 ===="
        git submodule update --init --recursive --depth=1

    # 3. 配置 Java 21 环境
    - name: Run actions/setup-java@v4
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'

    # 4. 配置 Go 环境
    - name: Run actions/setup-go@v5
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
        cache: false

    # 5. 配置新版 Go Mobile 与 NDK 运行环境
    - name: Set up Go Mobile & NDK
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
        
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH
        $HOME/go/bin/gomobile init

    # 6. 生成本地编译环境配置文件
    - name: Prepare Local Properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

    # 7. 在公开仓的免费算力下执行编译
    - name: Execute Exclave Native Build Script
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace

    # 8. 把编译好的 APK 产物上传到公开仓库的 Actions 页面
    - name: Upload APK Artifacts to Public Actions
      uses: actions/upload-artifact@v4
      with:
        name: Exclave-Free-Build-APKs
        path: |
          app/build/outputs/apk/release/*.apk
        if-no-files-found: error
