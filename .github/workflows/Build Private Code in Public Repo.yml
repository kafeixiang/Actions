name: Build Private Code in Public Repo (Dynamic Workflow Engine)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: '🚀 选择【目标私有项目】'
        required: true
        default: 'kafeixiang/husi'
        type: choice
        options:
          - 'kafeixiang/husi'
          - 'kafeixiang/Exclave'
          - 'kafeixiang/ClashMetaForAndroid'
          - 'kafeixiang/v2rayNG'
          - 'kafeixiang/NekoBoxForAndroid'
          - 'kafeixiang/FlClash'
          - 'kafeixiang/v2rayN'
          - 'kafeixiang/sing-box'
          - 'kafeixiang/mihomo'
          - 'kafeixiang/Xray'

      branch_preset:
        description: '🌿 选择【常用分支】(若选最后一项，则在下方手动输入)'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'main'
          - 'master'
          - 'dev-yl2-vless-xhttp'
          - 'FlClash'
          - 'Alpha'
          - 'CUSTOM_INPUT_BOX'

      custom_branch:
        description: '✍️ 手动输入【自定义分支】(仅在上方选择 CUSTOM_INPUT_BOX 时生效)'
        required: false
        default: ''
        type: string

      build_mode:
        description: '🛠️ 选择【编译流剧本】(自适应匹配原厂发布模式)'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'debug'
          - 'nightly'
          - 'mac'
          - 'desktop'

      target_platform:
        description: '💻 目标系统 (仅对包含多平台矩阵的项目生效)'
        required: true
        default: 'android'
        type: choice
        options:
          - 'android'
          - 'macos'
          - 'windows'
          - 'linux'

      target_arch:
        description: '🏗️ 目标架构 (选择 all 将自动触发三个架构循环各编译一个)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'arm64'
          - 'amd64'
          - 'arm'

      upload_to_release:
        description: '📦 是否同步上架到公开库的 Release 页面 (默认不上传)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  setup_matrix:
    runs-on: ubuntu-latest
    outputs:
      os_runner: ${{ steps.set_os.outputs.os_runner }}
    steps:
      - id: set_os
        run: |
          REPO="${{ github.event.inputs.repo }}"
          MODE="${{ github.event.inputs.build_mode }}"
          if echo "$REPO" | grep -q "v2rayN"; then
            echo "os_runner=windows-latest" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "mac" ]; then
            echo "os_runner=macos-latest" >> $GITHUB_OUTPUT
          else
            echo "os_runner=ubuntu-24.04" >> $GITHUB_OUTPUT
          fi

  build_using_native_script:
    needs: setup_matrix
    runs-on: ${{ needs.setup_matrix.outputs.os_runner }}

    steps:
      # 1. 智能合流
      - name: Parse Selection
        id: parse
        shell: bash
        run: |
          REPO="${{ github.event.inputs.repo }}"
          PRESET="${{ github.event.inputs.branch_preset }}"
          CUSTOM="${{ github.event.inputs.custom_branch }}"
          
          if [ "$PRESET" = "CUSTOM_INPUT_BOX" ]; then
            BRANCH="$CUSTOM"
          else
            BRANCH="$PRESET"
          fi
          
          if [ -z "$BRANCH" ]; then
            echo "❌ 错误：你选择了手动输入分支，但下方的自定义输入框留空了！"
            exit 1
          fi
          
          PROJECT_NAME=$(echo "$REPO" | cut -d'/' -f2)
          
          echo "TARGET_REPO=$REPO" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

      # 2. 检出目标私有仓库
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 3. 剧本锁定与环境参数抓取
      - name: Select Compilation Workflow and Extract Versions
        id: extract_env
        shell: bash
        run: |
          GO_VER="1.23.x"
          JAVA_VER="17"
          DOTNET_VER="8.0.x"
          CHOSEN_WF=""
          
          PROJECT="${{ env.PROJECT_NAME }}"
          MODE="${{ github.event.inputs.build_mode }}"
          
          echo ">>>> 📡 正在加载原厂核心地图进行强匹配路由..."
          case "$PROJECT" in
            "FlClash")
              CHOSEN_WF=".github/workflows/build.yaml"
              ;;
            "v2rayN"|"v2rayNG")
              CHOSEN_WF=".github/workflows/build.yml"
              ;;
            "ClashMetaForAndroid")
              if [ "$MODE" = "debug" ]; then
                CHOSEN_WF=".github/workflows/build-debug.yaml"
              elif [ "$MODE" = "nightly" ]; then
                CHOSEN_WF=".github/workflows/build-pre-release.yaml"
              else
                CHOSEN_WF=".github/workflows/build-release.yaml"
              fi
              ;;
            "NekoBoxForAndroid")
              if [ "$MODE" = "debug" ] || [ "$MODE" = "nightly" ]; then
                CHOSEN_WF=".github/workflows/preview.yml"
              else
                CHOSEN_WF=".github/workflows/SSR.yml"
              fi
              ;;
            "husi")
              if [ "$MODE" = "mac" ] && [ -f ".github/workflows/mac.yml" ]; then
                CHOSEN_WF=".github/workflows/mac.yml"
              elif [ "$MODE" = "nightly" ] && [ -f ".github/workflows/nightly.yml" ]; then
                CHOSEN_WF=".github/workflows/nightly.yml"
              else
                CHOSEN_WF=".github/workflows/release.yml"
              fi
              ;;
            "Exclave")
              if [ "$MODE" = "debug" ] && [ -f ".github/workflows/debug.yml" ]; then
                CHOSEN_WF=".github/workflows/debug.yml"
              else
                CHOSEN_WF=".github/workflows/release.yml"
              fi
              ;;
          esac
          
          if [ -z "$CHOSEN_WF" ] || [ ! -f "$CHOSEN_WF" ]; then
            echo ">>>> ⚠️ 当前项目未命中硬编码地图，正在执行全自动化特征层扫描..."
            if [ -d ".github/workflows" ]; then
              FILES=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || true)
              for f in $FILES; do
                fname=$(basename "$f" | tr '[:upper:]' '[:lower:]')
                if [[ "$fname" == *"$MODE"* ]]; then
                  if [[ "$fname" != *"lint"* && "$fname" != *"test"* && "$fname" != *"stale"* && "$fname" != *"cleanup"* && "$fname" != *"format"* ]]; then
                    CHOSEN_WF="$f"; break
                  fi
                fi
              done
              if [ -z "$CHOSEN_WF" ]; then
                for f in $FILES; do
                  fname=$(basename "$f" | tr '[:upper:]' '[:lower:]')
                  if [[ "$fname" == *"build"* || "$fname" == *"apk"* || "$fname" == *"compile"* || "$fname" == *"ci"* || "$fname" == *"desktop"* ]]; then
                    if [[ "$fname" != *"lint"* && "$fname" != *"test"* && "$fname" != *"stale"* && "$fname" != *"cleanup"* && "$fname" != *"format"* ]]; then
                      CHOSEN_WF="$f"; break
                    fi
                  fi
                done
              fi
              [ -z "$CHOSEN_WF" ] && CHOSEN_WF=$(echo "$FILES" | head -n 1)
            fi
          fi
          
          if [ ! -z "$CHOSEN_WF" ] && [ -f "$CHOSEN_WF" ]; then
            echo ">>>> 🎯 导航闭环！成功锁定本次编译的原厂剧本: $CHOSEN_WF"
            echo "CHOSEN_WORKFLOW=$CHOSEN_WF" >> $GITHUB_ENV
          
            FROM_WF_GO=$(grep -oP 'go-version:\s*[\x27\x22]?\K[0-9\.]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 || true)
            if [ ! -z "$FROM_WF_GO" ]; then
              [[ "$FROM_WF_GO" =~ ^[0-9]+\.[0-9]+$ ]] && FROM_WF_GO="${FROM_WF_GO}.x"
              GO_VER="$FROM_WF_GO"
            fi
            FROM_WF_JAVA=$(grep -oP 'java-version:\s*[\x27\x22]?\K[0-9\x27\x22]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 | tr -d "'\"" || true)
            [ ! -z "$FROM_WF_JAVA" ] && JAVA_VER="$FROM_WF_JAVA"
            FROM_WF_DOTNET=$(grep -oP 'dotnet-version:\s*[\x27\x22]?\K[0-9\.]+' "$CHOSEN_WF" 2>/dev/null | head -n 1 || true)
            [ ! -z "$FROM_WF_DOTNET" ] && DOTNET_VER="$FROM_WF_DOTNET"

            if grep -q "setup-zig" "$CHOSEN_WF"; then
              ZIG_V=$(grep -A 3 "setup-zig" "$CHOSEN_WF" | grep "version:" | head -n 1 | awk '{print $2}' | tr -d "'\"" || true)
              [ -z "$ZIG_V" ] && ZIG_V="0.13.0"
              echo "HAS_ZIG=true" >> $GITHUB_ENV
              echo "DYNAMIC_ZIG=$ZIG_V" >> $GITHUB_ENV
            fi
          else
            echo "❌ 致命错误：无论通过地图还是特征扫描，均无法找到目标编译流文件！"
            exit 1
          fi
          
          if [ -f "go.mod" ] && [ "$GO_VER" = "1.23.x" ]; then
            GO_MOD_V=$(awk '/^go [0-9]/ {print $2}' go.mod)
            [ ! -z "$GO_MOD_V" ] && GO_VER="${GO_MOD_V}.x"
          fi
          
          echo ">>>> [智能匹配成功] DYNAMIC 环境参数解锁：Go=$GO_VER, Java=$JAVA_VER, .NET=$DOTNET_VER"
          echo "DYNAMIC_GO=$GO_VER" >> $GITHUB_ENV
          echo "DYNAMIC_JAVA=$JAVA_VER" >> $GITHUB_ENV
          echo "DYNAMIC_DOTNET=$DOTNET_VER" >> $GITHUB_ENV

      # 4. 递归拉取底层子模块
      - name: Clone Submodules
        shell: bash
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # 5. 配置 Zig 环境
      - name: Set up Zig Toolchain
        if: env.HAS_ZIG == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.DYNAMIC_ZIG }}

      # 6. 配置 Java 环境
      - name: Set up Java Runtime
        if: env.PROJECT_NAME != 'v2rayN'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.DYNAMIC_JAVA }}
          distribution: 'temurin'

      # 7. 配置 Go 环境
      - name: Set up Go Runtime
        if: env.PROJECT_NAME == 'Exclave' || env.PROJECT_NAME == 'NekoBoxForAndroid' || env.PROJECT_NAME == 'husi' || env.PROJECT_NAME == 'ClashMetaForAndroid' || env.PROJECT_NAME == 'FlClash'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.DYNAMIC_GO }}
          cache: true
          cache-dependency-path: "**/go.sum"

      # 8. 挂载 Gradle 编译缓存
      - name: Setup Gradle Cache for Fast Build
        if: env.PROJECT_NAME != 'v2rayN' && env.PROJECT_NAME != 'FlClash'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      # 9. 配置 .NET / Flutter 环境
      - name: Set up .NET SDK
        if: env.PROJECT_NAME == 'v2rayN'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DYNAMIC_DOTNET }}

      - name: Set up Flutter
        if: env.PROJECT_NAME == 'FlClash'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 10. 挂载基础本地 Android 映射属性
      - name: Prepare Local Properties
        if: env.PROJECT_NAME != 'v2rayN'
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n 1 || echo "")
          if [ ! -z "$NDK_PATH" ]; then
            echo "ndk.dir=$NDK_PATH" >> local.properties
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          fi

      # ⭐ 11. 智能 Job 抽取 + 路径容错重构（解决 cd 报错与 cat 目录报错）
      - name: High-Fidelity Translate and Generate Build Script
        shell: bash
        run: |
          echo ">>>> 🎯 正在智能检索并过滤匹配平台 [${{ github.event.inputs.target_platform }}] 的目标 Job..."
          
          # 提取符合要求的 Job 步骤（排除仅针对桌面/Cronet 的无关多余步骤）
          yq e '.jobs | to_entries | .[] | select(.key | test("(?i)android|build|release|libcore|core|apk")) | .value.steps[].run | select(.)' "$CHOSEN_WORKFLOW" > extracted_steps.txt
          
          # 如果过滤后为空，保底提取全量步骤
          if [ ! -s extracted_steps.txt ]; then
            yq e '.jobs[] | select(.steps != null) | .steps[].run | select(.)' "$CHOSEN_WORKFLOW" > extracted_steps.txt
          fi

          python3 -c '
          import re

          with open("extracted_steps.txt", "r") as f:
              lines = f.readlines()

          processed_lines = []
          mapping = {
              "matrix.platform": "$MATRIX_PLATFORM",
              "matrix.arch": "$MATRIX_ARCH",
              "matrix.target": "$MATRIX_ARCH",
              "steps.project_version.outputs.version": "$VERSION",
              "steps.version.outputs.go_version": "$GO_VERSION",
              "env.DARWIN_SDKROOT": "$DARWIN_SDKROOT",
              "env.RELEASE_TAG": "$RELEASE_TAG",
              "env.FILE_SUFFIX": "$FILE_SUFFIX",
              "github.token": "$GH_TOKEN",
              "github.ref": "$GITHUB_REF"
          }

          pat = r"\$" + r"\{\{\s*(.*?)\s*\}\}"

          for line in lines:
              # 替换常规变量
              def repl(match):
                  key = match.group(1).strip()
                  return mapping.get(key, match.group(0))
          
              line = re.sub(pat, repl, line)
              # 清理未匹配到的 secrets 或其他 Action 内部表达
              line = re.sub(r"\$\{\{\s*.*?\s*\}\}", "", line)

              # 🟢 关键加固：对 cd 切换目录命令加上安全保护，防止路径不存在时中途崩盘
              if re.match(r"^\s*cd\s+", line):
                  target_dir = line.strip().split(maxsplit=1)[1]
                  line = f"mkdir -p {target_dir} 2>/dev/null; cd {target_dir} || true\n"

              processed_lines.append(line)

          with open("extracted_steps.txt", "w") as f:
              f.writelines(processed_lines)
          '
          
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo -e "\$MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\n\$MATRIX_ARCH='${{ github.event.inputs.target_arch }}'\n\$GH_TOKEN='${{ secrets.PAT_TOKEN }}'\n" > dynamic_run.ps1
            cat extracted_steps.txt >> dynamic_run.ps1
            echo ">>>> [Windows 翻译官] 原厂表达式在线翻译成功！"
          else
            if [ "${{ github.event.inputs.target_arch }}" = "all" ]; then
              echo -e "#!/bin/bash\nexport CGO_ENABLED=1\nexport GRADLE_OPTS=\"-Xmx4g\"\nexport MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\nexport GH_TOKEN='${{ secrets.PAT_TOKEN }}'\nexport GITHUB_REF='refs/heads/${{ env.TARGET_BRANCH }}'\n" > dynamic_run.sh
            else
              echo -e "#!/bin/bash\nexport CGO_ENABLED=1\nexport GRADLE_OPTS=\"-Xmx4g\"\nexport MATRIX_PLATFORM='${{ github.event.inputs.target_platform }}'\nexport MATRIX_ARCH='${{ github.event.inputs.target_arch }}'\nexport GH_TOKEN='${{ secrets.PAT_TOKEN }}'\nexport GITHUB_REF='refs/heads/${{ env.TARGET_BRANCH }}'\n" > dynamic_run.sh
            fi
            cat extracted_steps.txt >> dynamic_run.sh
            chmod +x dynamic_run.sh
            echo ">>>> [Unix 翻译官] 原厂表达式在线翻译成功！"
          fi

      # ⭐ 12-A. Unix 跑道执行（含 Libcore 缺失保底编译与错误中断防护）
      - name: Execute Dynamic Build Process [Linux / macOS Runner]
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          echo "=========================================="
          echo "🚀 正在使用公开库免费算力，动态重放原厂打包指令..."
          echo "=========================================="
          mkdir -p temp_staging
          
          # 🟢 husi / sing-box 专属逻辑：检测并保底触发 libcore 编译
          if [ "${{ env.PROJECT_NAME }}" = "husi" ] || [ "${{ env.PROJECT_NAME }}" = "sing-box" ]; then
            if [ ! -f "composeApp/libs/libcore.aar" ] && [ ! -f "app/libs/libcore.aar" ]; then
              echo ">>>> 🔧 检测到底层 libcore.aar 缺失，正在优先触发核心内核编译..."
              if [ -f "buildScript/lib/core.sh" ]; then
                bash buildScript/lib/core.sh || true
              elif [ -d "libcore" ]; then
                go run ./libcore || true
              fi
            fi
          fi

          if [ "${{ github.event.inputs.target_arch }}" = "all" ]; then
            ANY_SUCCESS=false
            for arch in arm64 amd64 arm; do
              export MATRIX_ARCH=$arch
              echo ">>>> 🔄 [矩阵编译中] 当前目标架构: $arch"
          
              if ./dynamic_run.sh; then
                ANY_SUCCESS=true
                echo ">>>> ✅ 架构 $arch 编译成功！暂存产物中..."
                find . -type f \( -name "*.apk" -o -name "*.aar" -o -name "*.dmg" -o -name "*.exe" \) ! -path "./temp_staging/*" ! -path "./unified_dist/*" -exec cp {} temp_staging/ \; 2>/dev/null || true
              else
                echo "⚠️ 架构 $arch 编译尝试完毕，检索暂存目录..."
              fi
            done
          else
            ./dynamic_run.sh
          fi

      # 12-B. Windows 跑道执行
      - name: Execute Dynamic Build Process [Windows Runner]
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          .\dynamic_run.ps1

      # 13. 顶级双重防护清洗箱（含调试全打印 + 智能兜底 Fallback）
      - name: Flatten and Clean Output Binaries with Fallback Protection
        shell: python
        run: |
          import os
          import shutil
          import re

          project_name = os.environ.get("PROJECT_NAME", "").lower()
          root_word = project_name.replace("forandroid", "").replace("for_android", "").replace("-android", "").replace("desktop", "").replace("_merge", "")
          root_word_clean = re.sub(r'[-_\s]', '', root_word)
          
          target_dir = "unified_dist"
          os.makedirs(target_dir, exist_ok=True)

          allowed_exts = (".apk", ".aab", ".dmg", ".zip", ".tar.gz", ".aar", ".exe")
          ignored_dirs = [".git", ".gradle", "gradle-wrapper", "node_modules", "intermediates", "build-cache", "cache", "tmp", "temp", "mock", "test", "tests", "obj"]

          print(f">>>> 🔍 [纯净指纹过滤器] 核心匹配字根: [{root_word_clean}]")

          all_found_files = []

          for root, dirs, files in os.walk("."):
              if any(ignored in root.replace("\\", "/").split("/") for ignored in ignored_dirs):
                  continue
              if target_dir in root:
                  continue
              for file in files:
                  if file.lower().endswith(allowed_exts):
                      full_p = os.path.join(root, file)
                      all_found_files.append((full_p, file))

          print(f">>>> 📁 [全盘扫描结果] 在编译环境中找到 {len(all_found_files)} 个潜在二进制文件：")
          for full_p, f in all_found_files:
              print(f"   - {full_p}")

          collected_count = 0
          for full_p, file in all_found_files:
              file_clean = re.sub(r'[-_\s]', '', file.lower())
              is_match = False
          
              if root_word_clean in file_clean:
                  is_match = True
              elif len(root_word_clean) >= 4 and root_word_clean[:4] in file_clean:
                  is_match = True
              elif any(k in file_clean for k in ["release", "unsigned", "installer", "uberjar"]) and any(k in full_p.lower() for k in ["outputs/apk", "bin/release", "packages", "libs", "temp_staging"]):
                  is_match = True
          
              if is_match:
                  dest_path = os.path.join(target_dir, file)
                  shutil.copy2(full_p, dest_path)
                  print(f"-> [💥 指纹命中] {file} => 写入 => {target_dir}")
                  collected_count += 1

          if collected_count == 0:
              print(">>>> ⚠️ 指纹未直接命中文件，触发全量保底搜刮机制（Fallback）...")
              for full_p, file in all_found_files:
                  if any(k in full_p.lower() for k in ["outputs/apk", "outputs/bundle", "bin/release", "packages", "libs", "temp_staging", "build/"]):
                      dest_path = os.path.join(target_dir, file)
                      shutil.copy2(full_p, dest_path)
                      print(f"-> [🛡️ 保底搜刮成功] {file} => 写入 => {target_dir}")

      # 14. 联动发布（按你的设计：仅当 upload_to_release 为 true 时触发）
      - name: Push and Publish to Public Repo Release Page
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -d "unified_dist" ] && [ "$(ls -A unified_dist 2>/dev/null)" ]; then
            CLEAN_BRANCH=$(echo "${{ env.TARGET_BRANCH }}" | tr '/' '-')
          
            VERSION=$(python3 -c '
          import os, re
          files = os.listdir("unified_dist")
          version = ""
          for f in files:
              m = re.search(r"(\d+\.\d+\.\d+(?:-[a-z0-9.]+)?)" , f, re.IGNORECASE)
              if m:
                  v = m.group(1)
                  v = re.sub(r"-(?:arm64|amd64|arm|x86|x86_64|v8a|v7a|unsigned|release|desktop|windows|macos|linux)$", "", v, flags=re.IGNORECASE)
                  version = v
                  break
          print(version)
          ')
          
            if [ -z "$VERSION" ]; then
              VERSION="${{ github.run_number }}"
            fi
          
            TAG_NAME="${{ env.PROJECT_NAME }}-${CLEAN_BRANCH}-v${VERSION}"
            echo ">>>> 🚀 生成 Release Tag: $TAG_NAME"
          
            gh release create "$TAG_NAME" unified_dist/* --repo "${{ github.repository }}" --title "$TAG_NAME" --notes "Automated smart build from private upstream: ${{ env.TARGET_REPO }} [${{ env.TARGET_BRANCH }}]" --prerelease
            echo ">>>> 🎉 全线发布成功！"
          else
            echo "⚠️ 未找到任何有效编译产物，跳过 Release 发布。"
          fi

      # 15. 备份层：Artifacts 平铺归档
      - name: Archive and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}--${{ env.TARGET_BRANCH }}--${{ github.event.inputs.target_platform }}--${{ github.event.inputs.target_arch }}--Artifacts
          path: unified_dist
          if-no-files-found: warn